<!doctype html>
<html lang="ms">
<head>
<meta charset="UTF-8" />

<title>Penyu Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --text-color:#F7F2E7; --text-outline:#061319; }
  html.light { --text-color:#0A1F2B; --text-outline:#F7F2E7; }
  body { font-family:'Inter',sans-serif; background:#0A1F2B; min-height:100vh; }
  html.light body { background:#EDE3CF; }
  body, h1,h2,h3,p,span,label,button,input,select,textarea,li,td,th,dt,dd {
    color: var(--text-color);
    text-shadow: -1px -1px 0 var(--text-outline), 1px -1px 0 var(--text-outline),

  }
  .font-display { font-family:'Fraunces',serif; }
  .tabular-num { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
  .frosted { border-radius:1.25rem; border:1px solid rgba(255,255,255,.08); box-shadow:0 8px 30px rgba(0,0,0,.35); backdrop-filter:blur(6px); background:rgba(10,31,43,.94); }
  html.light .frosted { background:rgba(247,242,231,.96); border:1px solid rgba(10,31,43,.08); }
  input,select,textarea { background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.1); border-radius:.6rem; padding:.75rem 1rem; width:100%; }
  html.light input, html.light select, html.light textarea { background:rgba(0,0,0,.05); }
  .btn { border-radius:.6rem .9rem .6rem .9rem; padding:.75rem 1.25rem; font-weight:600; transition:transform .15s; }
  .btn:active { transform:scale(.95); }
  .btn-primary { background:#1F6F78; border:1px solid #2E9099; }
  .btn-ghost { background:transparent; border:1px solid rgba(255,255,255,.15); }
  .btn:disabled { opacity:.4; pointer-events:none; }
  .screen { animation:fadein .3s ease; }
  @keyframes fadein { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  #bgvideo { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:-2; }
  #bgtint { position:fixed; inset:0; z-index:-1; background:linear-gradient(180deg, rgba(6,19,25,.55), rgba(6,19,25,.8)); }
  html.light #bgtint { background:linear-gradient(180deg, rgba(247,242,231,.45), rgba(247,242,231,.75)); }
</style>
</head>
<body class="dark">
<video id="bgvideo" autoplay muted loop playsinline></video>
<div id="bgtint"></div>

<div id="app" class="max-w-lg mx-auto px-5 py-8 pb-28"></div>

<nav id="navbar" class="fixed bottom-0 inset-x-0 px-4 pb-4 hidden">
  <div class="frosted flex items-center justify-around px-2 py-2 max-w-md mx-auto">
    <button onclick="go('entry')" class="flex flex-col items-center px-3 py-1.5">🐢<span class="text-[11px]">Log</span></button>
    <button onclick="go('myentries')" class="flex flex-col items-center px-3 py-1.5">📋<span class="text-[11px]">Entri</span></button>
    <button onclick="go('dashboard')" class="flex flex-col items-center px-3 py-1.5">📊<span class="text-[11px]">Dashboard</span></button>
    <button id="navAdmin" onclick="go('admin')" class="flex-col items-center px-3 py-1.5 hidden">⚙️<span class="text-[11px]">Admin</span></button>
    <button onclick="toggleTheme()" class="flex flex-col items-center px-3 py-1.5"><span id="themeIcon">🌙</span><span class="text-[11px]">Mod</span></button>
    <button onclick="logout()" class="flex flex-col items-center px-3 py-1.5">🚪<span class="text-[11px]">Keluar</span></button>
  </div>
</nav>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// ---- CONFIG: fill these in with your Supabase project values ----
const SUPABASE_URL = 'https://oatbghgoxedccxdjwalt.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_gQIBBbRniU3ixnV8eCDuYw_LeWpu0jK'
// -------------------------------------------------------------------

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
const app = document.getElementById('app')
const ISLANDS = [
  { code:'PTB', name:'Pulau Talang Besar' },
  { code:'PTK', name:'Pulau Talang Kechil' },
  { code:'PSB', name:'Pulau Satang Besar' }
]
const SPECIES = ['Penyu Agar (Green Turtle)','Penyu Karah (Hawksbill)','Lain-lain']

let state = { island: sessionStorage.getItem('penyu-island') || null, profile: null }

// ---------- Theme ----------
function toggleTheme() {
  const html = document.documentElement
  const isDark = html.classList.contains('dark')
  html.classList.toggle('dark', !isDark)
  html.classList.toggle('light', isDark)
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙'
  localStorage.setItem('penyu-theme', isDark ? 'light' : 'dark')
}
window.toggleTheme = toggleTheme

async function logout() {
  await supabase.auth.signOut()
  state.profile = null
  state.island = null
  sessionStorage.removeItem('penyu-island')
  location.hash = 'island'
  render('island')
}
window.logout = logout
const savedTheme = localStorage.getItem('penyu-theme') || 'dark'
document.documentElement.classList.remove('dark','light')
document.documentElement.classList.add(savedTheme)
document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '🌙' : '☀️'

// ---------- Background video (from Supabase storage, admin-uploadable) ----------
async function getAccessToken() {
  const { data } = await supabase.auth.getSession()
  return data.session?.access_token
}

function uploadVideoWithProgress(file, token, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest()
    xhr.open('POST', `${SUPABASE_URL}/storage/v1/object/app-assets/background.mp4`)
    xhr.setRequestHeader('Authorization', `Bearer ${token}`)
    xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY)
    xhr.setRequestHeader('x-upsert', 'true')
    xhr.setRequestHeader('Content-Type', file.type || 'video/mp4')
    xhr.upload.onprogress = (e) => { if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100)) }
    xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve() : reject(new Error(`Upload gagal (${xhr.status})`))
    xhr.onerror = () => reject(new Error('Ralat rangkaian semasa muat naik'))
    xhr.send(file)
  })
}
const { data: vid } = supabase.storage.from('app-assets').getPublicUrl('background.mp4')
if (vid?.publicUrl) document.getElementById('bgvideo').src = vid.publicUrl

// ---------- Offline queue (localStorage-based, simple) ----------
function queueWrite(write) {
  const q = JSON.parse(localStorage.getItem('penyu-queue') || '[]')
  q.push(write)
  localStorage.setItem('penyu-queue', JSON.stringify(q))
}
async function flushQueue() {
  if (!navigator.onLine) return
  let q = JSON.parse(localStorage.getItem('penyu-queue') || '[]')
  while (q.length) {
    const w = q[0]
    try {
      if (w.op === 'insert') await supabase.from('nest_records').insert(w.payload)
      else await supabase.from('nest_records').update(w.payload).eq('id', w.id)
      q.shift()
    } catch (e) { break }
  }
  localStorage.setItem('penyu-queue', JSON.stringify(q))
}
window.addEventListener('online', flushQueue)
flushQueue()

// ---------- Router ----------
function go(route) {
  if (location.hash.slice(1) === route) {
    render(route) // hash unchanged, hashchange won't fire — render manually
  } else {
    location.hash = route // hashchange listener below handles the render
  }
}
window.go = go

window.addEventListener('hashchange', () => render(location.hash.slice(1) || 'island'))

async function render(route) {
  document.getElementById('navbar').classList.toggle('hidden', !['entry','myentries','dashboard','admin'].includes(route))
  if (['entry','myentries','dashboard','admin'].includes(route) && !state.profile) {
    const { data } = await supabase.auth.getUser()
    if (!data.user) { route = 'island'; location.hash = 'island' }
    else {
      await loadProfile(data.user.id)
      const ok = await enforceIslandGate()
      if (!ok) return
    }
  }
  if (state.profile) {
    document.getElementById('navAdmin').classList.toggle('hidden', state.profile.role !== 'admin')
    document.getElementById('navAdmin').classList.toggle('flex', state.profile.role === 'admin')
  }

  const screens = { island: screenIsland, login: screenLogin, entry: screenEntry,
    myentries: screenMyEntries, dashboard: screenDashboard, admin: screenAdmin }
  app.innerHTML = ''
  const el = await (screens[route] || screenIsland)()
  app.appendChild(el)
}

async function loadProfile(userId) {
  const { data } = await supabase.from('staff_profiles').select('*').eq('id', userId).single()
  state.profile = data
  return data
}

// Single source of truth for the island gate — called after EVERY profile
// load (login, refresh, direct navigation), not just the login button.
// This is what stops a staff account from ever seeing another island's
// data, regardless of which code path loaded their session.
async function enforceIslandGate() {
  if (!state.profile) return false
  if (state.profile.role === 'admin') return true
  if (!state.island || state.profile.island !== state.island) {
    await supabase.auth.signOut()
    state.profile = null
    sessionStorage.removeItem('penyu-island')
    state.island = null
    alert(`Akaun ini ditugaskan ke ${state.profile?.island || 'pulau lain'}. Log masuk dari pulau anda sendiri.`)
    location.hash = 'island'
    return false
  }
  return true
}

function card(innerHTML, extraClass = '') {
  const d = document.createElement('div')
  d.className = `frosted p-5 screen ${extraClass}`
  d.innerHTML = innerHTML
  return d
}

// ---------- Island select ----------
function screenIsland() {
  const wrap = document.createElement('div')
  wrap.className = 'flex flex-col items-center gap-8 mt-10 screen'
  wrap.innerHTML = `
    <div class="text-center">
      <h1 class="font-display text-3xl font-semibold">Penyu Tracker</h1>
      <p class="opacity-80 mt-2">Pilih pulau stesen anda</p>
    </div>
    <div class="grid gap-4 w-full" id="islandList"></div>
  `
  const list = wrap.querySelector('#islandList')
  ISLANDS.forEach(isl => {
    const c = card(`
      <button class="w-full text-left flex items-center justify-between" data-code="${isl.code}">
        <div><div class="font-display text-xl">${isl.code}</div><div class="text-sm opacity-80">${isl.name}</div></div>
        <span class="text-2xl">→</span>
      </button>`)
    c.querySelector('button').onclick = () => { state.island = isl.code; sessionStorage.setItem('penyu-island', isl.code); go('login') }
    list.appendChild(c)
  })
  return wrap
}

// ---------- Login ----------
function screenLogin() {
  if (!state.island) { go('island'); return document.createElement('div') }
  const c = card(`
    <div class="mb-5 text-center">
      <div class="inline-block rounded px-3 py-1 text-sm font-semibold mb-2 bg-teal-900/40">${state.island}</div>
      <h1 class="font-display text-2xl font-semibold">Log Masuk Staf</h1>
    </div>
    <form id="loginForm" class="space-y-3">
      <input type="email" required placeholder="Emel" id="email" />
      <input type="password" required placeholder="Kata laluan" id="password" />
      <div id="loginError" class="text-sm hidden bg-red-500/10 border border-red-500/30 rounded px-3 py-2"></div>
      <button type="submit" class="btn btn-primary w-full mt-2">Log Masuk</button>
    </form>
  `, 'max-w-sm mx-auto mt-10')

  c.querySelector('#loginForm').onsubmit = async (e) => {
    e.preventDefault()
    const email = c.querySelector('#email').value
    const password = c.querySelector('#password').value
    const errBox = c.querySelector('#loginError')
    errBox.classList.add('hidden')

    const { data, error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) { errBox.textContent = error.message; errBox.classList.remove('hidden'); return }

    await loadProfile(data.user.id)
    const ok = await enforceIslandGate()
    if (!ok) return // enforceIslandGate already signed out and redirected with an alert
    await supabase.from('login_log').insert({ staff_id: data.user.id, island: state.island })
    go('entry')
  }
  return c
}

// ---------- Entry form ----------
function screenEntry() {
  const wrap = document.createElement('div')
  let mode = 'new'
  let step = 'form'
  wrap.innerHTML = `
    <div class="flex gap-2 mb-6">
      <button id="modeNew" class="btn btn-primary flex-1">Sarang Baru</button>
      <button id="modeHatch" class="btn btn-ghost flex-1">Kemaskini Menetas</button>
    </div>
    <div id="entryBody"></div>
  `
  const body = wrap.querySelector('#entryBody')

  function renderForm() {
    wrap.querySelector('#modeNew').className = `btn flex-1 ${mode==='new'?'btn-primary':'btn-ghost'}`
    wrap.querySelector('#modeHatch').className = `btn flex-1 ${mode==='hatch'?'btn-primary':'btn-ghost'}`
    const today = new Date().toISOString().slice(0,10)
    body.innerHTML = ''
    const c = card(`
      <form id="entryForm" class="space-y-4">
        <div><label class="text-sm opacity-80">Tarikh</label><input type="date" required value="${today}" id="f_tarikh" /></div>
        ${mode === 'new' ? `
          <div><label class="text-sm opacity-80">Spesies</label>
            <select id="f_species">${SPECIES.map(s=>`<option>${s}</option>`).join('')}</select></div>
          <div><label class="text-sm opacity-80">Status Tag</label>
            <div class="flex gap-2 mt-1">
              <button type="button" id="f_bertag_yes" class="btn btn-ghost flex-1">Bertag</button>
              <button type="button" id="f_bertag_no" class="btn btn-ghost flex-1">Tak Bertag</button>
            </div></div>
          <div><label class="text-sm opacity-80">RAM</label>
            <div class="flex gap-2 mt-1">
              <button type="button" id="f_ram_lpp" class="btn btn-primary flex-1">LPP</button>
              <button type="button" id="f_ram_sfc" class="btn btn-ghost flex-1">SFC</button>
            </div></div>
          <div><label class="text-sm opacity-80">Jumlah Telur Diram</label>
            <input type="number" inputmode="numeric" required id="f_jumlah" class="text-lg" /></div>
          <div><label class="text-sm opacity-80">Catatan (pilihan)</label><textarea id="f_catatan" rows="2"></textarea></div>
        ` : `
          <div><label class="text-sm opacity-80">Jumlah Telur Diram (rujukan)</label><input type="number" inputmode="numeric" id="f_jumlah" /></div>
          <div><label class="text-sm opacity-80">Telur Menetas</label><input type="number" inputmode="numeric" required id="f_menetas" class="text-lg" /></div>
          <div><label class="text-sm opacity-80">Telur Buruk</label><input type="number" inputmode="numeric" required id="f_buruk" class="text-lg" /></div>
          <div id="f_warning" class="hidden text-sm bg-amber-500/10 border border-amber-500/30 rounded px-3 py-2">⚠️ Menetas + buruk melebihi jumlah diram. Semak semula — tapi boleh hantar jika betul.</div>
        `}
        <button type="submit" class="btn btn-primary w-full">Semak &amp; Hantar →</button>
      </form>
    `)
    body.appendChild(c)

    let bertag = null, ram = 'LPP'
    if (mode === 'new') {
      c.querySelector('#f_bertag_yes').onclick = () => { bertag = true; c.querySelector('#f_bertag_yes').className='btn btn-primary flex-1'; c.querySelector('#f_bertag_no').className='btn btn-ghost flex-1' }
      c.querySelector('#f_bertag_no').onclick = () => { bertag = false; c.querySelector('#f_bertag_no').className='btn btn-primary flex-1'; c.querySelector('#f_bertag_yes').className='btn btn-ghost flex-1' }
      c.querySelector('#f_ram_lpp').onclick = () => { ram='LPP'; c.querySelector('#f_ram_lpp').className='btn btn-primary flex-1'; c.querySelector('#f_ram_sfc').className='btn btn-ghost flex-1' }
      c.querySelector('#f_ram_sfc').onclick = () => { ram='SFC'; c.querySelector('#f_ram_sfc').className='btn btn-primary flex-1'; c.querySelector('#f_ram_lpp').className='btn btn-ghost flex-1' }
    } else {
      const checkWarn = () => {
        const j = Number(c.querySelector('#f_jumlah').value||0), m = Number(c.querySelector('#f_menetas').value||0), b = Number(c.querySelector('#f_buruk').value||0)
        c.querySelector('#f_warning').classList.toggle('hidden', !(j && m+b > j))
      }
      c.querySelector('#f_menetas').oninput = checkWarn
      c.querySelector('#f_buruk').oninput = checkWarn
    }

    c.querySelector('#entryForm').onsubmit = (e) => {
      e.preventDefault()
      const payload = mode === 'new' ? {
        island: state.island, tarikh_dijumpai: c.querySelector('#f_tarikh').value,
        species: c.querySelector('#f_species').value,
        bertag, ram, jumlah_telur_diram: Number(c.querySelector('#f_jumlah').value),
        catatan: c.querySelector('#f_catatan').value || null, status: 'diram', created_by: state.profile.id
      } : {
        telur_menetas: Number(c.querySelector('#f_menetas').value),
        telur_buruk: Number(c.querySelector('#f_buruk').value),
        tarikh_menetas: c.querySelector('#f_tarikh').value, status: 'menetas', updated_by: state.profile.id
      }
      renderSummary(payload)
    }
  }

  function renderSummary(payload) {
    body.innerHTML = ''
    let countdown = 5
    const rows = mode === 'new' ? `
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Pulau</span><span class="font-semibold">${state.island}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Tarikh</span><span class="font-semibold">${payload.tarikh_dijumpai}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Spesies</span><span class="font-semibold">${payload.species}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Status Tag</span><span class="font-semibold">${payload.bertag?'Bertag':'Tak Bertag'}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">RAM</span><span class="font-semibold">${payload.ram}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Jumlah Telur</span><span class="font-semibold tabular-num">${payload.jumlah_telur_diram}</span></div>
    ` : `
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Tarikh</span><span class="font-semibold">${payload.tarikh_menetas}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Telur Menetas</span><span class="font-semibold tabular-num">${payload.telur_menetas}</span></div>
      <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Telur Buruk</span><span class="font-semibold tabular-num">${payload.telur_buruk}</span></div>
    `
    const c = card(`
      <h2 class="font-display text-xl mb-4">Sahkan Data</h2>
      <div class="space-y-2 text-sm">${rows}</div>
      <div class="flex gap-2 mt-6">
        <button id="backBtn" class="btn btn-ghost flex-1">← Betulkan</button>
        <button id="submitBtn" class="btn btn-primary flex-1" disabled>Tunggu 5s...</button>
      </div>
    `)
    body.appendChild(c)
    c.querySelector('#backBtn').onclick = renderForm
    const submitBtn = c.querySelector('#submitBtn')
    const iv = setInterval(() => {
      countdown--
      if (countdown <= 0) { clearInterval(iv); submitBtn.disabled = false; submitBtn.textContent = 'Hantar Sekarang' }
      else submitBtn.textContent = `Tunggu ${countdown}s...`
    }, 1000)

    submitBtn.onclick = async () => {
      submitBtn.disabled = true
      submitBtn.textContent = 'Menghantar...'
      let err = null
      if (!navigator.onLine) {
        queueWrite({ op: mode==='new'?'insert':'update', payload })
      } else {
        if (mode === 'new') {
          const res = await supabase.from('nest_records').insert(payload)
          err = res.error
        } else {
          const res = await supabase.from('nest_records').update(payload)
          err = res.error
        }
      }
      if (err) {
        submitBtn.disabled = false
        submitBtn.textContent = 'Hantar Sekarang'
        alert('Gagal menghantar: ' + err.message)
        return
      }
      body.innerHTML = ''
      const done = card(`<div class="text-center py-10"><div class="text-5xl mb-3">✅</div><p class="font-display text-lg">${navigator.onLine ? 'Data dihantar!' : 'Disimpan — akan sync bila online'}</p></div>`)
      body.appendChild(done)
      setTimeout(renderForm, 1800)
    }
  }

  wrap.querySelector('#modeNew').onclick = () => { mode='new'; renderForm() }
  wrap.querySelector('#modeHatch').onclick = () => { mode='hatch'; renderForm() }
  renderForm()
  return wrap
}

// ---------- My Entries ----------
async function screenMyEntries() {
  const wrap = document.createElement('div')
  wrap.innerHTML = `<h1 class="font-display text-2xl mb-5">Entri Saya</h1><div id="list">Memuatkan...</div>`
  const { data } = await supabase.from('nest_records').select('*').eq('created_by', state.profile.id).order('tarikh_dijumpai', { ascending:false }).limit(50)
  const list = wrap.querySelector('#list')
  list.innerHTML = ''
  if (!data || !data.length) {
    list.appendChild(card(`<div class="text-center py-8 opacity-80">Belum ada entri. Tekan "Sarang Baru" untuk mula.</div>`))
  } else {
    data.forEach(e => {
      const badgeMap = { diram: ['Menunggu','bg-amber-500/20 text-amber-300'], menetas: ['Menetas','bg-emerald-400/20 text-emerald-300'], gagal: ['Gagal','bg-red-500/20 text-red-300'] }
      const [label, cls] = badgeMap[e.status] || badgeMap.diram
      list.appendChild(card(`
        <div class="flex items-center justify-between">
          <div>
            <div class="font-semibold">${e.tarikh_dijumpai} · ${e.ram} · ${e.bertag?'Bertag':'Tak Bertag'}</div>
            <div class="text-sm opacity-75 tabular-num">${e.jumlah_telur_diram} telur${e.status==='menetas' ? ` · ${e.telur_menetas} menetas / ${e.telur_buruk} buruk` : ''}</div>
          </div>
          <span class="text-xs font-semibold px-2 py-1 rounded ${cls}">${label}</span>
        </div>
      `, 'mb-3'))
    })
  }
  return wrap
}

// ---------- Dashboard ----------
async function screenDashboard() {
  const year = new Date().getFullYear()
  const wrap = document.createElement('div')
  wrap.innerHTML = `<h1 class="font-display text-2xl mb-5">Dashboard ${year}</h1><div id="stats">Memuatkan...</div>`
  const { data } = await supabase.rpc('get_dashboard_totals', { p_year: year })
  const stats = wrap.querySelector('#stats')
  const jumlahTelur = data?.jumlah_telur || 0
  const jumlahMenetas = data?.jumlah_menetas || 0
  const jumlahBuruk = data?.jumlah_buruk || 0
  const target = data?.target || 20000
  const pct = Math.min(100, Math.round((jumlahTelur/target)*100))
  const hatchRate = (jumlahMenetas+jumlahBuruk) ? Math.round((jumlahMenetas/(jumlahMenetas+jumlahBuruk))*100) : 0
  stats.innerHTML = ''
  stats.appendChild(card(`
    <div class="text-sm opacity-70 mb-1">Jumlah Telur vs Sasaran</div>
    <div class="font-display text-4xl tabular-num mb-3">${jumlahTelur.toLocaleString()}</div>
    <div class="h-2 rounded-full bg-black/20 overflow-hidden"><div class="h-full bg-emerald-400" style="width:${pct}%"></div></div>
    <div class="text-xs opacity-70 mt-1">${pct}% daripada sasaran ${target.toLocaleString()}</div>
  `, 'mb-4'))
  stats.appendChild(card(`<div class="text-sm opacity-70">Kadar Menetas</div><div class="font-display text-3xl tabular-num">${hatchRate}%</div>`, 'mb-4'))
  stats.appendChild(card(`<div class="text-sm opacity-70">Telur Buruk</div><div class="font-display text-3xl tabular-num text-red-400">${jumlahBuruk.toLocaleString()}</div>`, 'mb-4'))
  stats.appendChild(card(`<div class="text-sm opacity-70">Baki ke Sasaran</div><div class="font-display text-2xl tabular-num">${(target-jumlahTelur).toLocaleString()}</div>`))
  return wrap
}

// ---------- Admin ----------
const MONTH_LABELS = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis']

async function screenAdmin() {
  if (state.profile?.role !== 'admin') return card('Akses admin sahaja.')
  const year = new Date().getFullYear()
  const { data: t } = await supabase.from('targets').select('*').eq('year', year).maybeSingle()
  const { data: mt } = await supabase.from('monthly_targets').select('*').eq('year', year)
  const { data: logins } = await supabase
    .from('login_log')
    .select('*, staff_profiles(full_name, island)')
    .order('logged_in_at', { ascending: false })
    .limit(20)

  const wrap = document.createElement('div')
  wrap.innerHTML = `<h1 class="font-display text-2xl mb-5">Tetapan Admin</h1><div id="adminBody" class="space-y-5"></div>`
  const body = wrap.querySelector('#adminBody')

  // --- Yearly target ---
  const targetCard = card(`
    <h2 class="font-display text-lg mb-3">Sasaran Tahunan</h2>
    <p class="text-sm opacity-70 mb-3">Tukar sendiri setiap tahun — tiada perlu coding.</p>
    <div class="flex gap-2">
      <input type="number" id="a_year" value="${year}" class="w-28" />
      <input type="number" id="a_target" placeholder="cth: 20000" value="${t?.target_value||''}" class="flex-1" />
    </div>
    <button id="a_saveTarget" class="btn btn-primary mt-3">Simpan Sasaran</button>
    <div id="a_msg" class="hidden text-sm mt-2 text-emerald-300"></div>
  `)
  body.appendChild(targetCard)
  targetCard.querySelector('#a_saveTarget').onclick = async () => {
    await supabase.from('targets').upsert({ year: Number(targetCard.querySelector('#a_year').value), target_value: Number(targetCard.querySelector('#a_target').value) })
    const m = targetCard.querySelector('#a_msg'); m.textContent = 'Sasaran disimpan ✓'; m.classList.remove('hidden')
  }

  // --- Monthly targets ---
  async function loadMonthlyTargets(yr) {
    const { data } = await supabase.from('monthly_targets').select('*').eq('year', yr)
    const map = {}
    ;(data || []).forEach(r => { map[r.month] = r.target_value })
    return map
  }

  function monthGridHTML(map) {
    return MONTH_LABELS.map((label, i) => {
      const m = i + 1
      return `<div><label class="text-xs opacity-70">${label}</label><input type="number" id="am_${m}" value="${map[m] ?? ''}" placeholder="-" /></div>`
    }).join('')
  }

  const initialMonthlyMap = {}
  ;(mt || []).forEach(r => { initialMonthlyMap[r.month] = r.target_value })

  const monthlyCard = card(`
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-display text-lg">Sasaran Bulanan</h2>
      <input type="number" id="a_monthlyYear" value="${year}" class="w-24" />
    </div>
    <p class="text-sm opacity-70 mb-3">Pilihan — pecahkan sasaran tahunan ikut bulan kalau perlu.</p>
    <div class="grid grid-cols-3 gap-2" id="a_monthGrid">${monthGridHTML(initialMonthlyMap)}</div>
    <button id="a_saveMonthly" class="btn btn-primary mt-3">Simpan Sasaran Bulanan</button>
    <div id="a_monthlyMsg" class="hidden text-sm mt-2 text-emerald-300"></div>
  `)
  body.appendChild(monthlyCard)

  monthlyCard.querySelector('#a_monthlyYear').onchange = async (e) => {
    const yr = Number(e.target.value)
    const map = await loadMonthlyTargets(yr)
    monthlyCard.querySelector('#a_monthGrid').innerHTML = monthGridHTML(map)
    monthlyCard.querySelector('#a_monthlyMsg').classList.add('hidden')
  }

  monthlyCard.querySelector('#a_saveMonthly').onclick = async () => {
    const yr = Number(monthlyCard.querySelector('#a_monthlyYear').value)
    const rows = MONTH_LABELS.map((_, i) => {
      const m = i + 1
      const val = monthlyCard.querySelector(`#am_${m}`).value
      return val === '' ? null : { year: yr, month: m, target_value: Number(val) }
    }).filter(Boolean)
    if (rows.length) await supabase.from('monthly_targets').upsert(rows)
    const m = monthlyCard.querySelector('#a_monthlyMsg'); m.textContent = 'Sasaran bulanan disimpan ✓'; m.classList.remove('hidden')
  }

  // --- Video upload with progress ---
  const videoCard = card(`
    <h2 class="font-display text-lg mb-3">Video Latar Belakang</h2>
    <p class="text-sm opacity-70 mb-3">Muat naik video baru (MP4, disyorkan &lt;15MB).</p>
    <input type="file" accept="video/mp4" id="a_video" class="text-sm" />
    <div id="a_videoProgress" class="hidden mt-3">
      <div class="h-2 rounded-full bg-black/20 overflow-hidden"><div id="a_videoBar" class="h-full bg-emerald-400 transition-all" style="width:0%"></div></div>
      <div id="a_videoPct" class="text-xs opacity-70 mt-1">0%</div>
    </div>
    <div id="a_videoMsg" class="hidden text-sm mt-2 text-emerald-300"></div>
  `)
  body.appendChild(videoCard)
  videoCard.querySelector('#a_video').onchange = async (e) => {
    const file = e.target.files[0]
    if (!file) return
    const progWrap = videoCard.querySelector('#a_videoProgress')
    const bar = videoCard.querySelector('#a_videoBar')
    const pct = videoCard.querySelector('#a_videoPct')
    const msg = videoCard.querySelector('#a_videoMsg')
    msg.classList.add('hidden')
    progWrap.classList.remove('hidden')
    bar.style.width = '0%'; pct.textContent = '0%'
    try {
      const token = await getAccessToken()
      await uploadVideoWithProgress(file, token, (p) => { bar.style.width = p + '%'; pct.textContent = p + '%' })
      msg.textContent = 'Video dikemaskini ✓ (refresh untuk lihat)'
      msg.classList.remove('hidden')
    } catch (err) {
      alert('Gagal muat naik video: ' + err.message)
    }
  }

  // --- Staff login history ---
  const historyRows = (logins || []).map(l => {
    const name = l.staff_profiles?.full_name || 'Tidak diketahui'
    const island = l.staff_profiles?.island || l.island || '-'
    const time = new Date(l.logged_in_at).toLocaleString('ms-MY')
    return `<div class="flex justify-between border-b border-white/10 pb-2 text-sm">
      <span>${name} <span class="opacity-60">(${island})</span></span>
      <span class="opacity-70 tabular-num">${time}</span>
    </div>`
  }).join('') || '<div class="text-sm opacity-70">Belum ada rekod log masuk.</div>'

  body.appendChild(card(`
    <h2 class="font-display text-lg mb-3">Sejarah Log Masuk Staf</h2>
    <div class="space-y-2">${historyRows}</div>
  `))

  body.appendChild(card(`
    <h2 class="font-display text-lg mb-3">Urus Staf &amp; Pulau</h2>
    <p class="text-sm opacity-70">Tambah staf, tetapkan pulau, atau tukar peranan di
      <a href="https://app.supabase.com" target="_blank" class="underline text-teal-300">Supabase Table Editor → staff_profiles</a>.</p>
  `))
  return wrap
}

// ---------- Init ----------
render(location.hash.slice(1) || 'island')
</script>
</body>
</html>
