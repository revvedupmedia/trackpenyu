    targetCard.querySelectorAll('#a_monthGrid input').forEach(inp => inp.addEventListener('input', () => computeYearlyTotal(targetCard)))
    computeYearlyTotal(targetCard)
    targetCard.querySelector('#a_msg').classList.add('hidden')
  }
  targetCard.querySelector('#a_island').onchange = reloadTargetCard
  targetCard.querySelector('#a_year').onchange = reloadTargetCard
  targetCard.querySelectorAll('#a_monthGrid input').forEach(inp => inp.addEventListener('input', () => computeYearlyTotal(targetCard)))

  targetCard.querySelector('#a_saveTarget').onclick = async () => {
    const yr = Number(targetCard.querySelector('#a_year').value)
    const isl = targetCard.querySelector('#a_island').value
    const rows = MONTH_LABELS.map((_,i) => { const m=i+1; const val = targetCard.querySelector(`#am_${m}`).value; return val==='' ? null : { year: yr, island: isl, month: m, target_value: Number(val) } }).filter(Boolean)
    if (rows.length) await supabase.from('monthly_targets').upsert(rows)
    const total = computeYearlyTotal(targetCard)
    await supabase.from('targets').upsert({ year: yr, island: isl, target_value: total })
    const m = targetCard.querySelector('#a_msg'); m.textContent = 'Sasaran disimpan ✓ (tahunan dikira dari jumlah bulanan)'; m.classList.remove('hidden')
  }
  } // end !isKerani (sasaran)

  const exportCard = card(`
    <h2 class="font-display text-lg mb-3">Eksport Excel</h2>
    <p class="text-sm opacity-70 mb-3">Jana fail Excel ikut format rasmi (JAN-DIS + JUMLAH tahunan), formula pengiraan kekal utuh.</p>
    <div class="grid grid-cols-2 gap-2">
      <div><label class="text-xs opacity-70">Pulau</label><select id="ex_island">${ISLANDS.map(i=>`<option value="${i.code}" ${i.code===state.island?'selected':''}>${i.code}</option>`).join('')}</select></div>
      <div><label class="text-xs opacity-70">Tahun</label><select id="ex_year">${Array.from({length:8},(_,i)=>year-2+i).map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}</select></div>
    </div>
    <button id="ex_go" class="btn btn-primary w-full mt-3">Jana &amp; Muat Turun Excel</button>
    <div id="ex_msg" class="hidden text-sm mt-2 text-emerald-300"></div>
  `)
  body.appendChild(exportCard)
  exportCard.querySelector('#ex_go').onclick = async () => {
    const btn = exportCard.querySelector('#ex_go')
    btn.disabled = true; btn.textContent = 'Menjana...'
    try {
      await exportToExcel(exportCard.querySelector('#ex_island').value, Number(exportCard.querySelector('#ex_year').value))
      const m = exportCard.querySelector('#ex_msg'); m.textContent = 'Excel dimuat turun ✓'; m.classList.remove('hidden')
    } catch (err) {
      toast('Gagal jana Excel: ' + err.message, 'error')
    }
    btn.disabled = false; btn.textContent = 'Jana & Muat Turun Excel'
  }

  // --- Excel import (admin only) ---
  if (!isKerani) {
  const importCard = card(`
    <h2 class="font-display text-lg mb-3">Import Excel</h2>
    <p class="text-sm opacity-70 mb-3">Auto key-in dari fail Excel sedia ada (format sama dengan eksport/template rasmi). <span class="text-emerald-300">Selamat import berulang kali — hari yang sudah wujud dalam app akan dilangkau automatik, hanya data baharu dimasukkan.</span></p>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div><label class="text-xs opacity-70">Pulau</label><select id="im_island">${ISLANDS.map(i=>`<option value="${i.code}" ${i.code===state.island?'selected':''}>${i.code}</option>`).join('')}</select></div>
      <div><label class="text-xs opacity-70">Tahun</label><select id="im_year">${Array.from({length:8},(_,i)=>year-5+i).map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}</select></div>
    </div>
    <input type="file" accept=".xlsx" id="im_file" class="text-sm" />
    <button id="im_go" class="btn btn-primary w-full mt-3" disabled>Pilih fail dahulu</button>
    <div id="im_msg" class="hidden text-sm mt-2 text-emerald-300"></div>
  `)
  body.appendChild(importCard)
  const imFile = importCard.querySelector('#im_file')
  const imGo = importCard.querySelector('#im_go')
  imFile.onchange = () => { imGo.disabled = !imFile.files.length; imGo.textContent = imFile.files.length ? 'Import Sekarang' : 'Pilih fail dahulu' }
  imGo.onclick = async () => {
    const file = imFile.files[0]
    if (!file) return
    imGo.disabled = true; imGo.textContent = 'Membaca fail...'
    try {
      const island = importCard.querySelector('#im_island').value
      const yr = Number(importCard.querySelector('#im_year').value)
      const buf = await file.arrayBuffer()
      const wb = XLSX.read(buf, { type: 'array' })
      const batchId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`
      const rows = []
      MONTH_SHEET_NAMES.forEach((sheetName, mi) => {
        const ws = wb.Sheets[sheetName]
        if (!ws) return
        const daysInMonth = new Date(yr, mi+1, 0).getDate()
        const num = (ref) => { const c = ws[ref]; const v = c ? Number(c.v) : 0; return isNaN(v) ? 0 : v }
        const txt = (ref) => { const c = ws[ref]; return c && c.v != null ? String(c.v) : null }
        for (let day = 1; day <= daysInMonth; day++) {
          const r = 7 + day
          const dateStr = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`
          // LPP: C,D (penyu) G,H (telur) K,L (menetas) S (dikeluarkan)
          const lpp = { bp_b:num(`C${r}`), bp_t:num(`D${r}`), td_b:num(`G${r}`), td_t:num(`H${r}`), tm_b:num(`K${r}`), tm_t:num(`L${r}`), dk:num(`S${r}`) }
          // SFC: E,F / I,J / M,N
          const sfc = { bp_b:num(`E${r}`), bp_t:num(`F${r}`), td_b:num(`I${r}`), td_t:num(`J${r}`), tm_b:num(`M${r}`), tm_t:num(`N${r}`), dk:0 }
          const cat = txt(`T${r}`)
          const build = (ram, v) => {
            const hasData = v.bp_b || v.bp_t || v.td_b || v.td_t || v.tm_b || v.tm_t || v.dk
            if (!hasData) return null
            return {
              island, tarikh: dateStr, ram,
              bilangan_penyu_bertag: v.bp_b, bilangan_penyu_takbertag: v.bp_t,
              jumlah_telur_diram_bertag: v.td_b, jumlah_telur_diram_takbertag: v.td_t,
              telur_menetas_bertag: (v.tm_b || v.tm_t) ? v.tm_b : null,
              telur_menetas_takbertag: (v.tm_b || v.tm_t) ? v.tm_t : null,
              jumlah_telur_dikeluarkan: v.dk || null,
              catatan: cat, created_by: state.profile.id, import_batch: batchId
            }
          }
          const lppRow = build('LPP', lpp); if (lppRow) rows.push(lppRow)
          const sfcRow = build('SFC', sfc); if (sfcRow) rows.push(sfcRow)
        }
      })
      if (!rows.length) { toast('Tiada data dijumpai dalam fail. Pastikan format ikut template rasmi.', 'error'); imGo.disabled = false; imGo.textContent = 'Import Sekarang'; return }

      // Dedupe: fetch existing (tarikh|ram) pairs for this island+year and
      // skip any import row that already exists — so re-importing an
      // updated file only adds the genuinely new days.
      imGo.textContent = 'Menyemak data sedia ada...'
      const { data: existing } = await supabase.from('daily_entries')
        .select('tarikh, ram')
        .eq('island', island)
        .gte('tarikh', `${yr}-01-01`).lte('tarikh', `${yr}-12-31`)
        .limit(2000)
      const existingKeys = new Set((existing||[]).map(e => `${e.tarikh}|${e.ram}`))
      const newRows = rows.filter(r => !existingKeys.has(`${r.tarikh}|${r.ram}`))
      const skipped = rows.length - newRows.length

      if (!newRows.length) {
        toast(`Semua ${rows.length} rekod sudah wujud dalam app — tiada yang diimport.`, 'info')
        imGo.disabled = false; imGo.textContent = 'Import Sekarang'
        return
      }

      imGo.textContent = `Memasukkan ${newRows.length} rekod baharu...`
      // Chunked insert (avoid huge single request)
      for (let i = 0; i < newRows.length; i += 100) {
        const { error } = await supabase.from('daily_entries').insert(newRows.slice(i, i+100))
        if (error) throw error
      }
      const m = importCard.querySelector('#im_msg')
      m.textContent = `${newRows.length} rekod baharu diimport ✓${skipped ? ` (${skipped} dilangkau — sudah wujud)` : ''}`
      m.classList.remove('hidden')
      toast(`${newRows.length} baharu diimport${skipped ? `, ${skipped} dilangkau` : ''}`, 'success')
      imFile.value = ''
      imGo.textContent = 'Pilih fail dahulu'
    } catch (err) {
      toast('Gagal import: ' + err.message, 'error')
      imGo.disabled = false; imGo.textContent = 'Import Sekarang'
    }
  }
  } // end !isKerani (import)

  // --- Sejarah Import + Undo (admin only) ---
  if (!isKerani) {
  const histCard = card(`
    <h2 class="font-display text-lg mb-3">Sejarah Import</h2>
    <p class="text-sm opacity-70 mb-3">Kalau tersilap import (cth: fail sama dua kali), buang seluruh batch di sini — data lain tidak terjejas.</p>
    <div id="importHist">${skeletonBlock(2)}</div>
  `)
  body.appendChild(histCard)
  async function loadImportHistory() {
    const el = histCard.querySelector('#importHist')
    const { data: imported } = await supabase.from('daily_entries')
      .select('import_batch, island, tarikh, created_at')
      .not('import_batch', 'is', null)
      .order('created_at', { ascending: false })
      .limit(1000)
    const batches = {}
    ;(imported||[]).forEach(r => {
      if (!batches[r.import_batch]) batches[r.import_batch] = { count:0, island:r.island, minD:r.tarikh, maxD:r.tarikh, when:r.created_at }
      const b = batches[r.import_batch]
      b.count++
      if (r.tarikh < b.minD) b.minD = r.tarikh
      if (r.tarikh > b.maxD) b.maxD = r.tarikh
    })
    const entries = Object.entries(batches)
    if (!entries.length) { el.innerHTML = '<div class="text-sm opacity-70">Belum ada import.</div>'; return }
    el.innerHTML = ''
    entries.forEach(([id, b]) => {
      const row = document.createElement('div')
      row.className = 'flex items-center justify-between gap-2 border-b border-white/10 pb-2 mb-2 text-sm'
      row.innerHTML = `
        <div>
          <div class="font-semibold">${b.island} · ${b.count} rekod</div>
          <div class="text-xs opacity-70">${fmtDate(b.minD)} → ${fmtDate(b.maxD)} · diimport ${new Date(b.when).toLocaleString('ms-MY')}</div>
        </div>
        <button class="btn btn-sm" style="background:rgba(225,96,76,.15); border:1px solid rgba(225,96,76,.4); color:#E1604C;">Buang</button>
      `
      row.querySelector('button').onclick = async () => {
        if (!confirm(`Buang import ini (${b.count} rekod, ${b.island})? Tindakan ini kekal.`)) return
        const { error } = await supabase.from('daily_entries').delete().eq('import_batch', id)
        if (error) { toast('Gagal buang: ' + error.message, 'error'); return }
        toast(`${b.count} rekod import dibuang`, 'success')
        loadImportHistory()
      }
      el.appendChild(row)
    })
  }
  loadImportHistory()

  // --- Data Lama Bulanan (admin only) — untuk tahun tanpa perincian harian (cth 2025 ke bawah) ---
  const legacyCard = card(`
    <h2 class="font-display text-lg mb-3">Data Lama (Bulanan)</h2>
    <p class="text-sm opacity-70 mb-3">Untuk tahun lama yang hanya ada jumlah bulanan (tiada perincian harian). Data ini masuk dalam Dashboard &amp; perbandingan tahun secara automatik.</p>
    <div class="grid grid-cols-3 gap-2 mb-3">
      <div><label class="text-xs opacity-70">Pulau</label><select id="lg_island">${ISLANDS.map(i=>`<option value="${i.code}" ${i.code===state.island?'selected':''}>${i.code}</option>`).join('')}</select></div>
      <div><label class="text-xs opacity-70">Tahun</label><select id="lg_year">${Array.from({length:15},(_,i)=>year-14+i).map(y=>`<option value="${y}" ${y===year-1?'selected':''}>${y}</option>`).join('')}</select></div>
      <div><label class="text-xs opacity-70">Bulan</label><select id="lg_month">${MONTH_LABELS.map((ml,i)=>`<option value="${i+1}">${ml}</option>`).join('')}</select></div>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div><label class="text-xs opacity-70">Bilangan Penyu</label><input type="number" inputmode="numeric" id="lg_penyu" /></div>
      <div><label class="text-xs opacity-70">Jumlah Telur</label><input type="number" inputmode="numeric" id="lg_telur" /></div>
      <div><label class="text-xs opacity-70">Telur Menetas (pilihan)</label><input type="number" inputmode="numeric" id="lg_menetas" /></div>
      <div><label class="text-xs opacity-70">Telur Buruk (pilihan)</label><input type="number" inputmode="numeric" id="lg_buruk" /></div>
    </div>
    <button id="lg_save" class="btn btn-primary w-full">Simpan Bulan Ini</button>
    <div class="eyebrow mt-4 mb-2">Data tersimpan</div>
    <div id="lg_list" class="text-sm">${skeletonBlock(1)}</div>
  `)
  body.appendChild(legacyCard)
  const lgIsl = () => legacyCard.querySelector('#lg_island').value
  const lgYr = () => Number(legacyCard.querySelector('#lg_year').value)
  const lgMo = () => Number(legacyCard.querySelector('#lg_month').value)
  async function loadLegacyRow() {
    const { data } = await supabase.from('monthly_summaries').select('*')
      .eq('island', lgIsl()).eq('year', lgYr()).eq('month', lgMo()).maybeSingle()
    legacyCard.querySelector('#lg_penyu').value = data?.bilangan_penyu ?? ''
    legacyCard.querySelector('#lg_telur').value = data?.jumlah_telur ?? ''
    legacyCard.querySelector('#lg_menetas').value = data?.telur_menetas ?? ''
    legacyCard.querySelector('#lg_buruk').value = data?.telur_buruk ?? ''
  }
  async function loadLegacyList() {
    const el = legacyCard.querySelector('#lg_list')
    const { data } = await supabase.from('monthly_summaries').select('*')
      .eq('island', lgIsl()).eq('year', lgYr()).order('month')
    if (!data || !data.length) { el.innerHTML = '<div class="opacity-70">Tiada data untuk tahun ini lagi.</div>'; return }
    el.innerHTML = data.map(r =>
      `<div class="flex justify-between border-b border-white/10 py-1.5"><span class="opacity-70">${MONTH_LABELS[r.month-1]}</span><span class="tabular-num font-semibold">${r.bilangan_penyu} penyu · ${r.jumlah_telur.toLocaleString()} telur</span></div>`
    ).join('')
  }
  legacyCard.querySelector('#lg_island').onchange = () => { loadLegacyRow(); loadLegacyList() }
  legacyCard.querySelector('#lg_year').onchange = () => { loadLegacyRow(); loadLegacyList() }
  legacyCard.querySelector('#lg_month').onchange = loadLegacyRow
  legacyCard.querySelector('#lg_save').onclick = async () => {
    const payload = {
      island: lgIsl(), year: lgYr(), month: lgMo(),
      bilangan_penyu: Number(legacyCard.querySelector('#lg_penyu').value || 0),
      jumlah_telur: Number(legacyCard.querySelector('#lg_telur').value || 0),
      telur_menetas: legacyCard.querySelector('#lg_menetas').value === '' ? null : Number(legacyCard.querySelector('#lg_menetas').value),
      telur_buruk: legacyCard.querySelector('#lg_buruk').value === '' ? null : Number(legacyCard.querySelector('#lg_buruk').value)
    }
    const { error } = await supabase.from('monthly_summaries').upsert(payload)
    if (error) { toast('Gagal simpan: ' + error.message, 'error'); return }
    toast(`${MONTH_LABELS[lgMo()-1]} ${lgYr()} disimpan`, 'success')
    loadLegacyList()
  }
  loadLegacyRow(); loadLegacyList()
  } // end !isKerani (import history + legacy)

  if (!isKerani) {
  const historyRows = (logins||[]).map(l => {

    <pre class="bg-black/30 rounded px-3 py-2 text-xs mt-2 overflow-x-auto">git add assets/background.mp4
git commit -m "update video"
git push</pre>
  `))

  body.appendChild(card(`
    <h2 class="font-display text-lg mb-3">Urus Staf &amp; Pulau</h2>
    <p class="text-sm opacity-70">Tambah staf, tetapkan pulau, atau tukar peranan di
      <a href="https://app.supabase.com" target="_blank" class="underline text-teal-300">Supabase Table Editor → staff_profiles</a>.</p>
  `))
  } // end !isKerani (admin-only cards)
  return wrap
}

// ---------- Excel export logic ----------
// ---------- Presentation generator (PptxGenJS) ----------
async function generatePresentation(island, year, s) {
  const pptx = new PptxGenJS()
  pptx.layout = 'LAYOUT_16x9'
  const NAVY = '0A1F2B', TEAL = '1F6F78', GLOW = '6EE7B7', SAND = 'F7F2E7', GOLD = 'E0A458', CORAL = 'E1604C'

  function baseSlide() {
    const sl = pptx.addSlide()
    sl.background = { color: NAVY }
    return sl
  }

  // Slide 1 — Title
  const s1 = baseSlide()
  s1.addText('Penyu Tracker', { x:0.6, y:1.7, w:9, h:0.9, fontSize:40, bold:true, color:SAND, fontFace:'Georgia' })
  s1.addText(`Laporan Prestasi — ${island} · ${year}`, { x:0.6, y:2.5, w:9, h:0.6, fontSize:20, color:GLOW })
  s1.addText(`Dijana ${new Date().toLocaleDateString('ms-MY')}`, { x:0.6, y:4.9, w:9, h:0.4, fontSize:11, color:'9CA3AF' })

  // Slide 2 — Key numbers
  const s2 = baseSlide()
  s2.addText('Pencapaian Sasaran', { x:0.5, y:0.35, fontSize:26, bold:true, color:SAND })
  const kpis = [
    [`${s.jumlahTelur.toLocaleString()}`, 'Jumlah Telur', GLOW],
    [s.target ? `${s.pct}%` : '—', 'Peratus Sasaran', GOLD],
    [`${s.jumlahPenyu.toLocaleString()}`, 'Bilangan Penyu', SAND],
    [`${s.hatchRate}%`, 'Kadar Menetas', GLOW],
    [`${s.jumlahBuruk.toLocaleString()}`, 'Telur Buruk', CORAL],
    [s.target ? s.target.toLocaleString() : '—', 'Sasaran Tahunan', SAND],
  ]
  kpis.forEach((k, i) => {
    const col = i % 3, row = Math.floor(i / 3)
    const x = 0.5 + col * 3.1, y = 1.3 + row * 1.9
    s2.addShape(pptx.ShapeType.roundRect, { x, y, w:2.85, h:1.6, fill:{ color:'123244' }, line:{ color:'1F6F78', width:1 }, rectRadius:0.08 })
    s2.addText(k[0], { x, y:y+0.15, w:2.85, h:0.8, align:'center', fontSize:28, bold:true, color:k[2] })
    s2.addText(k[1], { x, y:y+0.95, w:2.85, h:0.4, align:'center', fontSize:12, color:'9CA3AF' })
  })

  // Slide 3 — Monthly eggs bar chart
  const s3 = baseSlide()
  s3.addText('Trend Bulanan — Jumlah Telur', { x:0.5, y:0.35, fontSize:24, bold:true, color:SAND })
  s3.addChart(pptx.ChartType.bar, [{
    name: 'Telur', labels: s.monthly.map(m=>m.month), values: s.monthly.map(m=>m.telur)
  }], {
    x:0.5, y:1.1, w:9, h:4.2,
    chartColors:[TEAL], catAxisLabelColor:SAND, valAxisLabelColor:SAND,
    dataLabelColor:SAND, showLegend:false, showTitle:false,
    catAxisLineColor:'444444', valAxisLineColor:'444444'
  })

  // Slide 4 — Monthly turtle count bar chart
  const s4 = baseSlide()
  s4.addText('Trend Bulanan — Bilangan Penyu', { x:0.5, y:0.35, fontSize:24, bold:true, color:SAND })
  s4.addChart(pptx.ChartType.bar, [{
    name: 'Penyu', labels: s.monthlyPenyu.map(m=>m.month), values: s.monthlyPenyu.map(m=>m.penyu)
  }], {
    x:0.5, y:1.1, w:9, h:4.2,
    chartColors:[GLOW], catAxisLabelColor:SAND, valAxisLabelColor:SAND,
    dataLabelColor:SAND, showLegend:false, showTitle:false,
    catAxisLineColor:'444444', valAxisLineColor:'444444'
  })

  // Slide 5 — Closing
  const s5 = baseSlide()
  s5.addText('Terima Kasih', { x:0.6, y:2.2, w:9, h:0.9, fontSize:34, bold:true, color:SAND, fontFace:'Georgia' })
  s5.addText(`${island} · Penyu Tracker`, { x:0.6, y:2.95, w:9, h:0.5, fontSize:16, color:GLOW })

  pptx.writeFile({ fileName: `Pembentangan-${island}-${year}.pptx` })
}

async function exportToExcel(island, year) {
  const templateUrl = `assets/template-${island}.xlsx`
  const res = await fetch(templateUrl)
  if (!res.ok) throw new Error(`Template ${templateUrl} tidak dijumpai`)
  const buf = await res.arrayBuffer()
  const wb = XLSX.read(buf, { type: 'array', cellFormula: true, cellStyles: true })

  const yearStart = `${year}-01-01`
  const yearEnd = `${year}-12-31`
  const { data: dailyRows } = await supabase.from('daily_entries').select('*').eq('island', island).gte('tarikh', yearStart).lte('tarikh', yearEnd)
  const { data: nestRows } = await supabase.from('nest_records').select('*').eq('island', island).gte('tarikh_dijumpai', yearStart).lte('tarikh_dijumpai', yearEnd)

  const buckets = {}
  function ensureBucket(date, ram) {
    const key = `${date}|${ram}`
    if (!buckets[key]) buckets[key] = { bp_b:0, bp_t:0, td_b:0, td_t:0, tm_b:0, tm_t:0, tm_has:false, dk:0, cat:[] }
    return buckets[key]
  }
  ;(dailyRows||[]).forEach(d => {
    const b = ensureBucket(d.tarikh, d.ram)
    b.bp_b += d.bilangan_penyu_bertag; b.bp_t += d.bilangan_penyu_takbertag
    b.td_b += d.jumlah_telur_diram_bertag; b.td_t += d.jumlah_telur_diram_takbertag
    if (d.telur_menetas_bertag !== null) { b.tm_b += d.telur_menetas_bertag||0; b.tm_has = true }
    if (d.telur_menetas_takbertag !== null) { b.tm_t += d.telur_menetas_takbertag||0; b.tm_has = true }
    if (d.jumlah_telur_dikeluarkan) b.dk += d.jumlah_telur_dikeluarkan
    if (d.catatan) b.cat.push(d.catatan)
  })
  ;(nestRows||[]).forEach(n => {
    const b = ensureBucket(n.tarikh_dijumpai, n.ram)
    if (n.bertag) { b.bp_b += 1; b.td_b += n.jumlah_telur_diram; if (n.telur_menetas !== null) { b.tm_b += n.telur_menetas||0; b.tm_has = true } }
    else { b.bp_t += 1; b.td_t += n.jumlah_telur_diram; if (n.telur_menetas !== null) { b.tm_t += n.telur_menetas||0; b.tm_has = true } }
    if (n.jumlah_dikeluarkan) b.dk += n.jumlah_dikeluarkan
    if (n.catatan) b.cat.push(n.catatan)
  })

  MONTH_SHEET_NAMES.forEach((sheetName, mi) => {
    const ws = wb.Sheets[sheetName]
    if (!ws) return
    const daysInMonth = new Date(year, mi+1, 0).getDate()
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`
      const row = 7 + day
      const lpp = buckets[`${dateStr}|LPP`]
      const sfc = buckets[`${dateStr}|SFC`]
      const setCell = (col, val) => {
        if (val === undefined || val === null || val === 0) return
        const ref = `${col}${row}`
        const existing = ws[ref] || {}
        ws[ref] = { ...existing, t:'n', v: val }
      }
      if (lpp) { setCell('C', lpp.bp_b); setCell('D', lpp.bp_t); setCell('G', lpp.td_b); setCell('H', lpp.td_t); if (lpp.tm_has) { setCell('K', lpp.tm_b); setCell('L', lpp.tm_t) } if (lpp.dk) setCell('S', lpp.dk) }
      if (sfc) { setCell('E', sfc.bp_b); setCell('F', sfc.bp_t); setCell('I', sfc.td_b); setCell('J', sfc.td_t); if (sfc.tm_has) { setCell('M', sfc.tm_b); setCell('N', sfc.tm_t) } if (sfc.dk) setCell('T', sfc.dk) }
      const notes = [...(lpp?.cat||[]), ...(sfc?.cat||[])].join('; ')
      if (notes) { const ref = `T${row}`; ws[ref] = { ...(ws[ref]||{}), t:'s', v: notes } }
    }
  })

  XLSX.writeFile(wb, `Penyu-${island}-${year}.xlsx`)
}
