<!doctype html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Penyu Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root { --text-color:#F7F2E7; --text-outline:#061319; }
  html.light { --text-color:#0A1F2B; --text-outline:#F7F2E7; }
  * { transition: background-color .25s ease, border-color .25s ease, box-shadow .25s ease, color .25s ease; }
  body { font-family:'Inter',sans-serif; background:#0A1F2B; min-height:100vh; letter-spacing:-.01em; }
  html.light body { background:#EDE3CF; }
  body, h1,h2,h3,p,span,label,button,input,select,textarea,li,td,th,dt,dd {
    color: var(--text-color);
    text-shadow: -1px -1px 0 var(--text-outline), 1px -1px 0 var(--text-outline),
                 -1px 1px 0 var(--text-outline), 1px 1px 0 var(--text-outline);
  }
  .font-display { font-family:'Fraunces',serif; letter-spacing:-.02em; }
  .tabular-num { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
  .eyebrow { font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; opacity:.6; font-weight:600; }

  .frosted {
    position:relative; border-radius:1.5rem;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 8px 30px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.04) inset;
    backdrop-filter:blur(10px); background:rgba(10,31,43,.94);
    transition: transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s ease, background-color .25s ease, border-color .25s ease;
  }
  html.light .frosted { background:rgba(247,242,231,.96); border:1px solid rgba(10,31,43,.08); }
  .frosted:hover { transform: translateY(-2px); box-shadow:0 14px 40px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.06) inset; }
  .frosted::before {
    content:''; position:absolute; inset:0; border-radius:inherit; padding:1px;
    background:linear-gradient(135deg, rgba(110,231,183,.25), transparent 40%);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none;
  }
  .frosted-flat { position:relative; border-radius:1.25rem; border:1px solid rgba(255,255,255,.08); background:rgba(10,31,43,.85); backdrop-filter:blur(8px); }
  html.light .frosted-flat { background:rgba(247,242,231,.9); border:1px solid rgba(10,31,43,.08); }

  input,select,textarea {
    background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.1);
    border-radius:.75rem; padding:.75rem 1rem; width:100%;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  html.light input, html.light select, html.light textarea { background:rgba(0,0,0,.05); }
  input:focus, select:focus, textarea:focus { outline:none; border-color:#2E9099; box-shadow:0 0 0 3px rgba(46,144,153,.25); }
  input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
    -webkit-text-fill-color: var(--text-color) !important;
    -webkit-box-shadow: 0 0 0px 1000px rgba(0,0,0,.3) inset !important;
    caret-color: var(--text-color); transition: background-color 9999s ease-in-out 0s;
  }
  html.light input:-webkit-autofill, html.light input:-webkit-autofill:hover,
  html.light input:-webkit-autofill:focus, html.light input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px rgba(0,0,0,.06) inset !important;
  }

  .btn { border-radius:.75rem 1.1rem .75rem 1.1rem; padding:.8rem 1.3rem; font-weight:600; transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease, filter .2s ease; position:relative; }
  .btn:active { transform:scale(.94); }
  .btn:hover { filter:brightness(1.08); }
  .btn-primary { background:linear-gradient(135deg, #1F6F78, #164e54); border:1px solid #2E9099; box-shadow:0 4px 20px -4px rgba(46,144,153,.5); }
  .btn-primary:hover { box-shadow:0 6px 26px -4px rgba(46,144,153,.7); }
  .btn-ghost { background:transparent; border:1px solid rgba(255,255,255,.15); }
  .btn-ghost:hover { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.3); }
  .btn-sm { padding:.5rem .9rem; font-size:.8rem; }
  .btn:disabled { opacity:.4; pointer-events:none; }
  .btn-back { display:inline-flex; align-items:center; gap:.4rem; font-size:.875rem; opacity:.75; padding:.4rem .2rem; margin-bottom:.75rem; }
  .btn-back:hover { opacity:1; transform:translateX(-2px); }

  .screen { animation:screenIn .4s cubic-bezier(.16,1,.3,1) both; }
  @keyframes screenIn { from{opacity:0; transform:translateY(14px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);} }
  #app { animation:appIn .35s cubic-bezier(.16,1,.3,1); }
  @keyframes appIn { from{opacity:0;} to{opacity:1;} }

  @keyframes splashPop { 0%{opacity:0; transform:scale(.55) rotate(-10deg);} 60%{opacity:1; transform:scale(1.08) rotate(2deg);} 100%{opacity:1; transform:scale(1) rotate(0);} }
  @keyframes splashFade { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes splashRing { 0%{transform:scale(.9); opacity:.5;} 100%{transform:scale(1.6); opacity:0;} }
  .splash-ring { position:absolute; inset:0; border-radius:2rem; border:2px solid #6EE7B7; animation:splashRing 1.8s ease-out infinite; }
  .splash-logo-wrap { position:relative; width:112px; height:112px; display:flex; align-items:center; justify-content:center; }

  #bgvideo { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:-2; filter:brightness(1.2); }
  #bgtint { position:fixed; inset:0; z-index:-1; background:rgba(6,19,25,.2); }
  html.light #bgtint { background:rgba(247,242,231,.2); }

  .ambient-orb { position:fixed; border-radius:50%; filter:blur(90px); z-index:-1; opacity:.28; pointer-events:none; }
  #orb1 { width:420px; height:420px; top:-100px; left:-100px; background:#1F6F78; }
  #orb2 { width:380px; height:380px; bottom:-120px; right:-80px; background:#7C9473; }

  nav .frosted { border-radius:1.75rem; }
  nav button, nav a { transition: transform .15s cubic-bezier(.34,1.56,.64,1), background-color .2s ease; border-radius:.75rem; }
  nav button:active { transform:scale(.88); }

  .seg { display:flex; gap:.4rem; padding:.3rem; border-radius:1rem; background:rgba(0,0,0,.18); }
  html.light .seg { background:rgba(0,0,0,.05); }
  .seg button { flex:1; padding:.6rem .5rem; border-radius:.7rem; font-size:.85rem; font-weight:600; transition: all .2s ease; }
  .seg button.active { background:linear-gradient(135deg,#1F6F78,#164e54); box-shadow:0 2px 10px -2px rgba(46,144,153,.5); }

  .xp-bar { height:14px; border-radius:999px; background:rgba(0,0,0,.25); overflow:hidden; position:relative; }
  .xp-fill { height:100%; background:linear-gradient(90deg,#1F6F78,#6EE7B7); border-radius:999px; transition:width 1s cubic-bezier(.16,1,.3,1); box-shadow:0 0 16px rgba(110,231,183,.6); }
  .milestone { position:absolute; top:-4px; width:2px; height:22px; background:rgba(255,255,255,.35); }

  .month-hp { position:relative; border-radius:.9rem; overflow:hidden; height:70px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.08); }
  .month-hp-fill { position:absolute; inset:0 auto 0 0; width:0%; background:linear-gradient(90deg,#164e54,#6EE7B7); transition:width 1.1s cubic-bezier(.16,1,.3,1); }
  .month-hp-fill.over { background:linear-gradient(90deg,#7C4B1F,#E0A458); }
  .month-hp-content { position:relative; z-index:1; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; padding:0 .25rem; }
  .month-hp-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.06em; opacity:.85; }
  .month-hp-value { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:.68rem; line-height:1.15; text-align:center; }
  .month-hp-pct { font-size:.58rem; opacity:.75; }

  .list-row { display:flex; align-items:center; gap:.75rem; padding:.85rem; border-radius:1rem; }
  .list-row:hover { background:rgba(255,255,255,.03); }
  .avatar-badge { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; flex-shrink:0; background:linear-gradient(135deg,#1F6F78,#164e54); }

  .type-pill { font-size:.65rem; font-weight:700; padding:.15rem .5rem; border-radius:999px; text-transform:uppercase; letter-spacing:.03em; }
  .type-harian { background:rgba(124,148,115,.25); color:#9AB18F; }
  .type-individu { background:rgba(46,144,153,.25); color:#6EE7B7; }
</style>
</head>
<body class="dark">
<video id="bgvideo" autoplay muted loop playsinline></video>
<div id="bgtint"></div>
<div class="ambient-orb" id="orb1"></div>
<div class="ambient-orb" id="orb2"></div>

<div id="app" class="max-w-lg mx-auto px-5 py-8 pb-28"></div>

<nav id="navbar" class="fixed bottom-0 inset-x-0 px-4 pb-4 hidden">
  <div class="frosted flex items-center justify-around px-2 py-2 max-w-md mx-auto overflow-x-auto">
    <span id="islandBadge" class="text-[10px] font-bold px-2 py-1 rounded-full bg-emerald-400/20 text-emerald-300 flex-shrink-0"></span>
    <button onclick="go('entry')" class="flex flex-col items-center px-2.5 py-1.5">🐢<span class="text-[10px]">Log</span></button>
    <button onclick="go('entries')" class="flex flex-col items-center px-2.5 py-1.5">📋<span class="text-[10px]">Entri</span></button>
    <button onclick="go('dashboard')" class="flex flex-col items-center px-2.5 py-1.5">📊<span class="text-[10px]">Dashboard</span></button>
    <button id="navAdmin" onclick="go('admin')" class="flex-col items-center px-2.5 py-1.5 hidden">⚙️<span class="text-[10px]">Admin</span></button>
    <button onclick="toggleTheme()" class="flex flex-col items-center px-2.5 py-1.5"><span id="themeIcon">🌙</span><span class="text-[10px]">Mod</span></button>
    <button onclick="logout()" class="flex flex-col items-center px-2.5 py-1.5">🚪<span class="text-[10px]">Keluar</span></button>
  </div>
</nav>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://oatbghgoxedccxdjwalt.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_gQIBBbRniU3ixnV8eCDuYw_LeWpu0jK'

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
const app = document.getElementById('app')
const ISLANDS = [
  { code:'PTB', name:'Pulau Talang Besar' },
  { code:'PTK', name:'Pulau Talang Kechil' },
  { code:'PSB', name:'Pulau Satang Besar' }
]
const SPECIES = ['Penyu Agar (Green Turtle)','Penyu Karah (Hawksbill)','Lain-lain']
const MONTH_LABELS = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis']
const MONTH_SHEET_NAMES = ['JAN','FEB','MAC','APRIL','MEI','JUN','JULAI','OGOS','SEPT','OKTO','NOV','DIS']

let state = { island: sessionStorage.getItem('penyu-island') || null, profile: null, editTarget: null, entriesTab: 'saya' }

// ---------- Theme ----------
function toggleTheme() {
  const html = document.documentElement
  const isDark = html.classList.contains('dark')
  html.classList.toggle('dark', !isDark)
  html.classList.toggle('light', isDark)
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙'
  localStorage.setItem('penyu-theme', isDark ? 'light' : 'dark')
}
window.toggleTheme = toggleTheme

async function logout() {
  await supabase.auth.signOut()
  state.profile = null
  state.island = null
  sessionStorage.removeItem('penyu-island')
  go('splash')
}
window.logout = logout
const savedTheme = localStorage.getItem('penyu-theme') || 'dark'
document.documentElement.classList.remove('dark','light')
document.documentElement.classList.add(savedTheme)
document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '🌙' : '☀️'

// ---------- Background video (repo file) ----------
const bgVideoEl = document.getElementById('bgvideo')
bgVideoEl.src = 'assets/background.mp4'
bgVideoEl.onerror = () => { bgVideoEl.style.display = 'none' }

// ---------- Offline queue ----------
function queueWrite(write) {
  const q = JSON.parse(localStorage.getItem('penyu-queue') || '[]')
  q.push(write)
  localStorage.setItem('penyu-queue', JSON.stringify(q))
}
async function flushQueue() {
  if (!navigator.onLine) return
  let q = JSON.parse(localStorage.getItem('penyu-queue') || '[]')
  while (q.length) {
    const w = q[0]
    try {
      if (w.op === 'insert') await supabase.from(w.table).insert(w.payload)
      else await supabase.from(w.table).update(w.payload).eq('id', w.id)
      q.shift()
    } catch (e) { break }
  }
  localStorage.setItem('penyu-queue', JSON.stringify(q))
}
window.addEventListener('online', flushQueue)
flushQueue()

// ---------- Draft persistence (anti-frustration: survive accidental back/refresh) ----------
function saveDraft(key, data) { localStorage.setItem('draft-' + key, JSON.stringify(data)) }
function loadDraft(key) { try { return JSON.parse(localStorage.getItem('draft-' + key)) } catch { return null } }
function clearDraft(key) { localStorage.removeItem('draft-' + key) }

// ---------- Router ----------
function go(route) {
  if (location.hash.slice(1) === route) render(route)
  else location.hash = route
}
window.go = go
window.addEventListener('hashchange', () => render(location.hash.slice(1) || 'island'))

async function render(route) {
  document.getElementById('navbar').classList.toggle('hidden', !['entry','entries','dashboard','admin'].includes(route))
  if (['entry','entries','dashboard','admin'].includes(route) && !state.profile) {
    const { data } = await supabase.auth.getUser()
    if (!data.user) { route = 'island'; location.hash = 'island' }
    else {
      await loadProfile(data.user.id)
      const ok = await enforceIslandGate()
      if (!ok) return
    }
  }
  if (state.profile) {
    document.getElementById('navAdmin').classList.toggle('hidden', state.profile.role !== 'admin')
    document.getElementById('navAdmin').classList.toggle('flex', state.profile.role === 'admin')
    const badge = document.getElementById('islandBadge')
    if (badge) badge.textContent = state.island
  }
  const screens = { splash: screenSplash, island: screenIsland, login: screenLogin, entry: screenEntry,
    entries: screenEntries, editentry: screenEditEntry, dashboard: screenDashboard, admin: screenAdmin }
  app.innerHTML = ''
  const el = await (screens[route] || screenIsland)()
  app.appendChild(el)
}

async function loadProfile(userId) {
  const { data } = await supabase.from('staff_profiles').select('*').eq('id', userId).single()
  state.profile = data
  return data
}

async function enforceIslandGate() {
  if (!state.profile) return false
  if (state.profile.role === 'admin') return true
  if (!state.island || state.profile.island !== state.island) {
    await supabase.auth.signOut()
    state.profile = null
    sessionStorage.removeItem('penyu-island')
    state.island = null
    alert(`Akaun ini ditugaskan ke ${state.profile?.island || 'pulau lain'}. Log masuk dari pulau anda sendiri.`)
    location.hash = 'island'
    return false
  }
  return true
}

function card(innerHTML, extraClass = '') {
  const d = document.createElement('div')
  d.className = `frosted p-5 screen ${extraClass}`
  d.innerHTML = innerHTML
  return d
}
function flatCard(innerHTML, extraClass = '') {
  const d = document.createElement('div')
  d.className = `frosted-flat p-4 screen ${extraClass}`
  d.innerHTML = innerHTML
  return d
}

// ---------- Splash (plays on cold load + after logout) ----------
function screenSplash() {
  const wrap = document.createElement('div')
  wrap.className = 'min-h-[70vh] flex flex-col items-center justify-center gap-5 screen cursor-pointer'
  wrap.innerHTML = `
    <div class="splash-logo-wrap">
      <div class="splash-ring"></div>
      <div class="splash-ring" style="animation-delay:.4s"></div>
      <img src="assets/logo.png" id="splashLogo" class="w-24 h-24 object-contain rounded-2xl relative z-10" style="animation: splashPop .7s cubic-bezier(.34,1.56,.64,1) both; box-shadow:0 8px 30px rgba(0,0,0,.4);" />
    </div>
    <div class="text-center" style="animation: splashFade .8s ease .25s both;">
      <h1 class="font-display text-3xl font-semibold">Penyu Tracker</h1>
      <p class="opacity-60 text-sm mt-1">Memuatkan...</p>
    </div>
  `
  const img = wrap.querySelector('#splashLogo')
  img.onerror = () => { img.style.display = 'none' }
  const timer = setTimeout(() => go('island'), 1800)
  wrap.onclick = () => { clearTimeout(timer); go('island') }
  return wrap
}

// ---------- Island select ----------
function screenIsland() {
  const wrap = document.createElement('div')
  wrap.className = 'flex flex-col items-center gap-8 mt-10 screen'
  wrap.innerHTML = `
    <div class="text-center">
      <h1 class="font-display text-3xl font-semibold">Penyu Tracker</h1>
      <p class="opacity-80 mt-2">Pilih pulau stesen anda</p>
    </div>
    <div class="grid gap-4 w-full" id="islandList"></div>
  `
  const list = wrap.querySelector('#islandList')
  ISLANDS.forEach(isl => {
    const c = card(`
      <button class="w-full text-left flex items-center justify-between" data-code="${isl.code}">
        <div><div class="font-display text-xl">${isl.code}</div><div class="text-sm opacity-80">${isl.name}</div></div>
        <span class="text-2xl">→</span>
      </button>`)
    c.querySelector('button').onclick = () => { state.island = isl.code; sessionStorage.setItem('penyu-island', isl.code); go('login') }
    list.appendChild(c)
  })
  return wrap
}

// ---------- Login ----------
function screenLogin() {
  if (!state.island) { go('island'); return document.createElement('div') }
  const c = card(`
    <button id="backToIsland" class="btn-back">← Tukar pulau</button>
    <div class="mb-5 text-center">
      <div class="inline-block rounded px-3 py-1 text-sm font-semibold mb-2 bg-teal-900/40">${state.island}</div>
      <h1 class="font-display text-2xl font-semibold">Log Masuk Staf</h1>
    </div>
    <form id="loginForm" class="space-y-3">
      <input type="email" required placeholder="Emel" id="email" />
      <input type="password" required placeholder="Kata laluan" id="password" />
      <div id="loginError" class="text-sm hidden bg-red-500/10 border border-red-500/30 rounded px-3 py-2"></div>
      <button type="submit" class="btn btn-primary w-full mt-2">Log Masuk</button>
    </form>
  `, 'max-w-sm mx-auto mt-10')
  c.querySelector('#backToIsland').onclick = () => { sessionStorage.removeItem('penyu-island'); state.island = null; go('island') }
  c.querySelector('#loginForm').onsubmit = async (e) => {
    e.preventDefault()
    const email = c.querySelector('#email').value
    const password = c.querySelector('#password').value
    const errBox = c.querySelector('#loginError')
    errBox.classList.add('hidden')
    const { data, error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) { errBox.textContent = error.message; errBox.classList.remove('hidden'); return }
    await loadProfile(data.user.id)
    const ok = await enforceIslandGate()
    if (!ok) return
    await supabase.from('login_log').insert({ staff_id: data.user.id, island: state.island })
    go('entry')
  }
  return c
}

// =========================================================================
// ENTRY — two modes: Harian (daily aggregate) and Individu (per-turtle)
// =========================================================================
function screenEntry() {
  const wrap = document.createElement('div')
  let mode = localStorage.getItem('penyu-lastmode') || 'harian'
  wrap.innerHTML = `
    <div class="flex items-center gap-2 mb-4">
      <h1 class="font-display text-2xl">Entri</h1>
      <span class="rounded px-2.5 py-1 text-xs font-semibold bg-teal-900/40">${state.island}</span>
    </div>
    <div class="seg mb-6">
      <button id="modeHarian" class="${mode==='harian'?'active':''}">Entri Harian</button>
      <button id="modeIndividu" class="${mode==='individu'?'active':''}">Entri Individu</button>
    </div>
    <div id="entryBody"></div>
  `
  const body = wrap.querySelector('#entryBody')
  function setMode(m) {
    mode = m; localStorage.setItem('penyu-lastmode', m)
    wrap.querySelector('#modeHarian').className = mode==='harian' ? 'active' : ''
    wrap.querySelector('#modeIndividu').className = mode==='individu' ? 'active' : ''
    body.innerHTML = ''
    body.appendChild(mode === 'harian' ? buildHarianForm() : buildIndividuForm())
  }
  wrap.querySelector('#modeHarian').onclick = () => setMode('harian')
  wrap.querySelector('#modeIndividu').onclick = () => setMode('individu')
  body.appendChild(mode === 'harian' ? buildHarianForm() : buildIndividuForm())
  return wrap
}

// ---- Entri Harian (matches Excel template's per-day-per-RAM row shape) ----
function buildHarianForm() {
  const draft = loadDraft('harian') || {}
  const today = new Date().toISOString().slice(0,10)
  const holder = document.createElement('div')

  function renderForm() {
    holder.innerHTML = ''
    const c = card(`
      <form id="harianForm" class="space-y-4">
        <div><label class="text-sm opacity-80">Tarikh</label><input type="date" required value="${draft.tarikh || today}" id="h_tarikh" /></div>
        <div>
          <label class="text-sm opacity-80">RAM</label>
          <div class="seg mt-1">
            <button type="button" id="h_ram_lpp" class="${(draft.ram||'LPP')==='LPP'?'active':''}">LPP</button>
            <button type="button" id="h_ram_sfc" class="${draft.ram==='SFC'?'active':''}">SFC</button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs opacity-70">Bilangan Penyu Bertag</label><input type="number" inputmode="numeric" id="h_bp_bertag" value="${draft.bp_bertag ?? ''}" /></div>
          <div><label class="text-xs opacity-70">Bilangan Penyu Tak Bertag</label><input type="number" inputmode="numeric" id="h_bp_takbertag" value="${draft.bp_takbertag ?? ''}" /></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs opacity-70">Jumlah Telur Diram (Bertag)</label><input type="number" inputmode="numeric" id="h_telur_bertag" value="${draft.telur_bertag ?? ''}" class="text-lg" /></div>
          <div><label class="text-xs opacity-70">Jumlah Telur Diram (Tak Bertag)</label><input type="number" inputmode="numeric" id="h_telur_takbertag" value="${draft.telur_takbertag ?? ''}" class="text-lg" /></div>
        </div>
        <div><label class="text-sm opacity-80">Catatan (pilihan)</label><textarea id="h_catatan" rows="2">${draft.catatan || ''}</textarea></div>
        <button type="submit" class="btn btn-primary w-full">Semak &amp; Hantar →</button>
      </form>
    `)
    holder.appendChild(c)

    let ram = draft.ram || 'LPP'
    const setRam = (r) => { ram = r; c.querySelector('#h_ram_lpp').className = r==='LPP'?'active':''; c.querySelector('#h_ram_sfc').className = r==='SFC'?'active':''; persistDraft() }
    c.querySelector('#h_ram_lpp').onclick = () => setRam('LPP')
    c.querySelector('#h_ram_sfc').onclick = () => setRam('SFC')

    function persistDraft() {
      draft.tarikh = c.querySelector('#h_tarikh').value
      draft.ram = ram
      draft.bp_bertag = c.querySelector('#h_bp_bertag').value
      draft.bp_takbertag = c.querySelector('#h_bp_takbertag').value
      draft.telur_bertag = c.querySelector('#h_telur_bertag').value
      draft.telur_takbertag = c.querySelector('#h_telur_takbertag').value
      draft.catatan = c.querySelector('#h_catatan').value
      saveDraft('harian', draft)
    }
    c.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', persistDraft))

    c.querySelector('#harianForm').onsubmit = (e) => {
      e.preventDefault()
      const payload = {
        island: state.island, tarikh: c.querySelector('#h_tarikh').value, ram,
        bilangan_penyu_bertag: Number(c.querySelector('#h_bp_bertag').value || 0),
        bilangan_penyu_takbertag: Number(c.querySelector('#h_bp_takbertag').value || 0),
        jumlah_telur_diram_bertag: Number(c.querySelector('#h_telur_bertag').value || 0),
        jumlah_telur_diram_takbertag: Number(c.querySelector('#h_telur_takbertag').value || 0),
        catatan: c.querySelector('#h_catatan').value || null,
        created_by: state.profile.id
      }
      renderHarianSummary(payload)
    }
  }

  function renderHarianSummary(payload) {
    holder.innerHTML = ''
    let countdown = 5
    const c = card(`
      <h2 class="font-display text-xl mb-4">Sahkan Data Harian</h2>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Pulau</span><span class="font-semibold">${state.island}</span></div>
        <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Tarikh</span><span class="font-semibold">${payload.tarikh}</span></div>
        <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">RAM</span><span class="font-semibold">${payload.ram}</span></div>
        <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Bilangan Penyu (Bertag/Tak)</span><span class="font-semibold tabular-num">${payload.bilangan_penyu_bertag} / ${payload.bilangan_penyu_takbertag}</span></div>
        <div class="flex justify-between border-b border-white/10 pb-2"><span class="opacity-70">Jumlah Telur (Bertag/Tak)</span><span class="font-semibold tabular-num">${payload.jumlah_telur_diram_bertag} / ${payload.jumlah_telur_diram_takbertag}</span></div>
      </div>
      <div class="flex gap-2 mt-6">
        <button id="backBtn" class="btn btn-ghost flex-1">← Betulkan</button>
        <button id="submitBtn" class="btn btn-primary flex-1" disabled>Tunggu 5s...</button>
      </div>
    `)
    holder.appendChild(c)
    c.querySelector('#backBtn').onclick = renderForm
    const submitBtn = c.querySelector('#submitBtn')
    const iv = setInterval(() => {
      countdown--
      if (countdown <= 0) { clearInterval(iv); submitBtn.disabled = false; submitBtn.textContent = 'Hantar Sekarang' }
      else submitBtn.textContent = `Tunggu ${countdown}s...`
    }, 1000)
    submitBtn.onclick = async () => {
      submitBtn.disabled = true; submitBtn.textContent = 'Menghantar...'
      let err = null
      if (!navigator.onLine) { queueWrite({ table:'daily_entries', op:'insert', payload }) }
      else { const res = await supabase.from('daily_entries').insert(payload); err = res.error }
      if (err) { submitBtn.disabled = false; submitBtn.textContent = 'Hantar Sekarang'; alert('Gagal menghantar: ' + err.message); return }
      clearDraft('harian')
      holder.innerHTML = ''
      holder.appendChild(card(`<div class="text-center py-10"><div class="text-5xl mb-3">✅</div><p class="font-display text-lg">${navigator.onLine ? 'Data harian dihantar!' : 'Disimpan — akan sync bila online'}</p></div>`))
      setTimeout(() => { draft.telur_bertag=''; draft.telur_takbertag=''; draft.bp_bertag=''; draft.bp_takbertag=''; draft.catatan=''; renderForm() }, 1800)
    }
  }

  renderForm()
  return holder
}

// ---- Entri Individu (per-turtle, dynamic count, full draft persistence) ----
function buildIndividuForm() {
  const draft = loadDraft('individu') || { tarikh: new Date().toISOString().slice(0,10), count: 1, turtles: [] }
  const holder = document.createElement('div')

  function ensureTurtles(n) {
    const arr = draft.turtles || []
    while (arr.length < n) arr.push({ bertag: null, ram: 'LPP', jumlah: '' })
    arr.length = n
    draft.turtles = arr
  }
  ensureTurtles(Number(draft.count) || 1)

  function renderSetup() {
    holder.innerHTML = ''
    const c = card(`
      <div class="space-y-4">
        <div><label class="text-sm opacity-80">Tarikh</label><input type="date" required value="${draft.tarikh}" id="i_tarikh" /></div>
        <div>
          <label class="text-sm opacity-80">Bilangan Penyu Hari Ini</label>
          <select id="i_count">${Array.from({length:30},(_,i)=>i+1).map(n=>`<option value="${n}" ${n==draft.count?'selected':''}>${n} ekor</option>`).join('')}</select>
        </div>
        <button id="i_continue" class="btn btn-primary w-full">Teruskan →</button>
      </div>
    `)
    holder.appendChild(c)
    c.querySelector('#i_tarikh').oninput = (e) => { draft.tarikh = e.target.value; saveDraft('individu', draft) }
    c.querySelector('#i_count').onchange = (e) => { draft.count = Number(e.target.value); ensureTurtles(draft.count); saveDraft('individu', draft) }
    c.querySelector('#i_continue').onclick = renderTurtleList
  }

  function renderTurtleList() {
    holder.innerHTML = ''
    const header = document.createElement('div')
    header.className = 'flex items-center justify-between mb-4'
    header.innerHTML = `<button class="btn-back">← Tukar bilangan</button><span class="eyebrow">${draft.tarikh} · ${draft.count} ekor</span>`
    header.querySelector('button').onclick = renderSetup
    holder.appendChild(header)

    const listWrap = document.createElement('div')
    listWrap.className = 'space-y-3'
    draft.turtles.forEach((t, i) => {
      const tc = flatCard(`
        <div class="flex items-center justify-between mb-2">
          <span class="font-display text-base">Penyu #${i+1}</span>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div class="seg" data-role="bertag">
            <button type="button" data-val="true" class="${t.bertag===true?'active':''}">Bertag</button>
            <button type="button" data-val="false" class="${t.bertag===false?'active':''}">Tak Bertag</button>
          </div>
          <div class="seg" data-role="ram">
            <button type="button" data-val="LPP" class="${t.ram==='LPP'?'active':''}">LPP</button>
            <button type="button" data-val="SFC" class="${t.ram==='SFC'?'active':''}">SFC</button>
          </div>
        </div>
        <input type="number" inputmode="numeric" placeholder="Jumlah telur" value="${t.jumlah}" data-role="jumlah" class="text-lg" />
      `, 'mb-0')
      tc.querySelectorAll('[data-role="bertag"] button').forEach(b => b.onclick = () => {
        t.bertag = b.dataset.val === 'true'
        tc.querySelectorAll('[data-role="bertag"] button').forEach(x => x.className = x===b?'active':'')
        saveDraft('individu', draft)
      })
      tc.querySelectorAll('[data-role="ram"] button').forEach(b => b.onclick = () => {
        t.ram = b.dataset.val
        tc.querySelectorAll('[data-role="ram"] button').forEach(x => x.className = x===b?'active':'')
        saveDraft('individu', draft)
      })
      tc.querySelector('[data-role="jumlah"]').oninput = (e) => { t.jumlah = e.target.value; saveDraft('individu', draft) }
      listWrap.appendChild(tc)
    })
    holder.appendChild(listWrap)

    const submitWrap = document.createElement('div')
    submitWrap.className = 'mt-4'
    submitWrap.appendChild(card(`
      <button id="i_review" class="btn btn-primary w-full">Semak Semua &amp; Hantar →</button>
    `))
    holder.appendChild(submitWrap)
    submitWrap.querySelector('#i_review').onclick = () => {
      const incomplete = draft.turtles.some(t => t.bertag === null || !t.jumlah)
      if (incomplete) { alert('Sila lengkapkan semua ' + draft.count + ' penyu dahulu (status tag & jumlah telur).'); return }
      renderIndividuSummary()
    }
  }

  function renderIndividuSummary() {
    holder.innerHTML = ''
    let countdown = 5
    const totalTelur = draft.turtles.reduce((s,t) => s + Number(t.jumlah||0), 0)
    const c = card(`
      <h2 class="font-display text-xl mb-4">Sahkan ${draft.count} Rekod Penyu</h2>
      <div class="space-y-1 text-sm max-h-64 overflow-y-auto mb-4">
        ${draft.turtles.map((t,i) => `<div class="flex justify-between border-b border-white/10 py-1.5"><span class="opacity-70">Penyu #${i+1} · ${t.ram} · ${t.bertag?'Bertag':'Tak Bertag'}</span><span class="font-semibold tabular-num">${t.jumlah} telur</span></div>`).join('')}
      </div>
      <div class="flex justify-between text-sm mb-4 pt-2 border-t border-white/20"><span class="opacity-80 font-semibold">Jumlah Keseluruhan</span><span class="font-display text-lg tabular-num">${totalTelur} telur</span></div>
      <div class="flex gap-2">
        <button id="backBtn" class="btn btn-ghost flex-1">← Betulkan</button>
        <button id="submitBtn" class="btn btn-primary flex-1" disabled>Tunggu 5s...</button>
      </div>
    `)
    holder.appendChild(c)
    c.querySelector('#backBtn').onclick = renderTurtleList
    const submitBtn = c.querySelector('#submitBtn')
    const iv = setInterval(() => {
      countdown--
      if (countdown <= 0) { clearInterval(iv); submitBtn.disabled = false; submitBtn.textContent = 'Hantar Sekarang' }
      else submitBtn.textContent = `Tunggu ${countdown}s...`
    }, 1000)
    submitBtn.onclick = async () => {
      submitBtn.disabled = true; submitBtn.textContent = 'Menghantar...'
      const rows = draft.turtles.map(t => ({
        island: state.island, tarikh_dijumpai: draft.tarikh, species: SPECIES[0],
        bertag: t.bertag, ram: t.ram, jumlah_telur_diram: Number(t.jumlah),
        status: 'diram', created_by: state.profile.id
      }))
      let err = null
      if (!navigator.onLine) { rows.forEach(payload => queueWrite({ table:'nest_records', op:'insert', payload })) }
      else { const res = await supabase.from('nest_records').insert(rows); err = res.error }
      if (err) { submitBtn.disabled = false; submitBtn.textContent = 'Hantar Sekarang'; alert('Gagal menghantar: ' + err.message); return }
      clearDraft('individu')
      holder.innerHTML = ''
      holder.appendChild(card(`<div class="text-center py-10"><div class="text-5xl mb-3">✅</div><p class="font-display text-lg">${draft.count} rekod dihantar!</p></div>`))
      setTimeout(() => { draft.turtles = []; draft.count = 1; ensureTurtles(1); renderSetup() }, 1800)
    }
  }

  renderSetup()
  return holder
}

// =========================================================================
// ENTRIES LIST — "Entri Saya" / "Entri Semua" with click-to-edit
// =========================================================================
async function screenEntries() {
  const wrap = document.createElement('div')
  wrap.innerHTML = `
    <div class="flex items-center gap-2 mb-4">
      <h1 class="font-display text-2xl">Entri</h1>
      <span class="rounded px-2.5 py-1 text-xs font-semibold bg-teal-900/40">${state.island}</span>
    </div>
    <div class="seg mb-3">
      <button id="tabSaya" class="${state.entriesTab==='saya'?'active':''}">Entri Saya</button>
      <button id="tabSemua" class="${state.entriesTab==='semua'?'active':''}">Entri Semua</button>
    </div>
    <div class="flex gap-2 mb-5">
      <input type="month" id="filterMonth" class="flex-1" value="${new Date().toISOString().slice(0,7)}" />
      <button id="filterClear" class="btn btn-ghost btn-sm">Semua Tarikh</button>
    </div>
    <div id="entriesList">Memuatkan...</div>
  `
  const listEl = wrap.querySelector('#entriesList')
  let monthFilter = null // null = show all, else 'YYYY-MM'
  async function loadList() {
    listEl.innerHTML = 'Memuatkan...'
    const scopeOwn = state.entriesTab === 'saya'
    let dq = supabase.from('daily_entries').select('*, staff_profiles!created_by(full_name)').eq('island', state.island).order('tarikh', { ascending:false }).limit(100)
    let nq = supabase.from('nest_records').select('*, staff_profiles!created_by(full_name)').eq('island', state.island).order('tarikh_dijumpai', { ascending:false }).limit(100)
    if (scopeOwn) { dq = dq.eq('created_by', state.profile.id); nq = nq.eq('created_by', state.profile.id) }
    if (monthFilter) {
      const [y,m] = monthFilter.split('-')
      const lastDay = new Date(Number(y), Number(m), 0).getDate()
      dq = dq.gte('tarikh', `${monthFilter}-01`).lte('tarikh', `${monthFilter}-${lastDay}`)
      nq = nq.gte('tarikh_dijumpai', `${monthFilter}-01`).lte('tarikh_dijumpai', `${monthFilter}-${lastDay}`)
    }
    const [dailyRes, nestRes] = await Promise.all([dq, nq])
    if (dailyRes.error || nestRes.error) {
      listEl.innerHTML = ''
      listEl.appendChild(card(`<div class="text-sm text-red-400">Ralat memuatkan entri: ${dailyRes.error?.message || nestRes.error?.message}</div>`))
      return
    }
    const daily = dailyRes.data, nests = nestRes.data
    const combined = [
      ...(daily||[]).map(d => ({ type:'harian', date: d.tarikh, id: d.id, owner: d.created_by, ownerName: d.staff_profiles?.full_name || '?', summary: `${d.ram} · ${d.bilangan_penyu_bertag+d.bilangan_penyu_takbertag} ekor · ${d.jumlah_telur_diram_bertag+d.jumlah_telur_diram_takbertag} telur` })),
      ...(nests||[]).map(n => ({ type:'individu', date: n.tarikh_dijumpai, id: n.id, owner: n.created_by, ownerName: n.staff_profiles?.full_name || '?', summary: `${n.ram} · ${n.bertag?'Bertag':'Tak Bertag'} · ${n.jumlah_telur_diram} telur${n.status==='menetas' ? ' · Menetas' : ''}` }))
    ].sort((a,b) => new Date(b.date) - new Date(a.date))

    listEl.innerHTML = ''
    if (!combined.length) { listEl.appendChild(card('<div class="text-center py-8 opacity-80">Tiada entri untuk tempoh ini.</div>')); return }
    combined.forEach((e, i) => {
      const canEdit = e.owner === state.profile.id || state.profile.role === 'admin'
      const row = flatCard(`
        <div class="list-row ${canEdit ? 'cursor-pointer' : ''}">
          <div class="avatar-badge">${e.ownerName.charAt(0).toUpperCase()}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-semibold text-sm">${e.date}</span>
              <span class="type-pill ${e.type==='harian'?'type-harian':'type-individu'}">${e.type==='harian'?'Harian':'Individu'}</span>
            </div>
            <div class="text-xs opacity-75 tabular-num">${e.summary}</div>
            <div class="text-[11px] opacity-50">${e.ownerName}</div>
          </div>
          ${canEdit ? '<span class="opacity-50">✏️</span>' : ''}
        </div>
      `, 'mb-2 p-2')
      if (canEdit) row.onclick = () => { state.editTarget = { type: e.type, id: e.id }; go('editentry') }
      listEl.appendChild(row)
    })
  }
  wrap.querySelector('#tabSaya').onclick = () => { state.entriesTab='saya'; wrap.querySelector('#tabSaya').className='active'; wrap.querySelector('#tabSemua').className=''; loadList() }
  wrap.querySelector('#tabSemua').onclick = () => { state.entriesTab='semua'; wrap.querySelector('#tabSemua').className='active'; wrap.querySelector('#tabSaya').className=''; loadList() }
  wrap.querySelector('#filterMonth').onchange = (e) => { monthFilter = e.target.value || null; loadList() }
  wrap.querySelector('#filterClear').onclick = () => { monthFilter = null; wrap.querySelector('#filterMonth').value = ''; loadList() }
  monthFilter = wrap.querySelector('#filterMonth').value || null
  loadList()
  return wrap
}

// ---------- Edit entry (fixes old bug: now always targets a specific id) ----------
function attachDeleteUI(wrap, table, id) {
  const delCard = card(`
    <h2 class="font-display text-lg mb-2 text-red-400">Zon Bahaya</h2>
    <p class="text-sm opacity-70 mb-3">Padam rekod ini secara kekal. Tindakan ini tidak boleh dibatalkan.</p>
    <button id="e_del" class="btn w-full" style="background:rgba(225,96,76,.15); border:1px solid rgba(225,96,76,.4); color:#E1604C;" disabled>Tunggu 5s...</button>
  `, 'mt-4')
  wrap.appendChild(delCard)
  const delBtn = delCard.querySelector('#e_del')
  let countdown = 5
  const iv = setInterval(() => {
    countdown--
    if (countdown <= 0) { clearInterval(iv); delBtn.disabled = false; delBtn.textContent = 'Padam Entri Ini' }
    else delBtn.textContent = `Tunggu ${countdown}s...`
  }, 1000)
  delBtn.onclick = async () => {
    if (!confirm('Padam rekod ini? Tindakan ini kekal.')) return
    delBtn.disabled = true
    const { error } = await supabase.from(table).delete().eq('id', id)
    if (error) { alert('Gagal padam: ' + error.message); delBtn.disabled = false; return }
    alert('Rekod dipadam ✓')
    go('entries')
  }
}

        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs opacity-70">Status Tag</label>
            <div class="seg mt-1"><button type="button" id="e_b_yes" class="${n.bertag?'active':''}">Bertag</button><button type="button" id="e_b_no" class="${!n.bertag?'active':''}">Tak Bertag</button></div>
          </div>
          <div><label class="text-xs opacity-70">RAM</label>
            <div class="seg mt-1"><button type="button" id="e_r_lpp" class="${n.ram==='LPP'?'active':''}">LPP</button><button type="button" id="e_r_sfc" class="${n.ram==='SFC'?'active':''}">SFC</button></div>
          </div>
        </div>
        <div><label class="text-xs opacity-70">Jumlah Telur Diram</label><input type="number" id="e_td" value="${n.jumlah_telur_diram}" /></div>
        <div class="eyebrow mt-2">Hatch (isi bila dah menetas)</div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs opacity-70">Telur Menetas</label><input type="number" id="e_tm" value="${n.telur_menetas ?? ''}" /></div>
          <div><label class="text-xs opacity-70">Telur Buruk</label><input type="number" id="e_tb" value="${n.telur_buruk ?? ''}" /></div>
        </div>
        <div><label class="text-xs opacity-70">Catatan</label><textarea id="e_cat" rows="2">${n.catatan||''}</textarea></div>
        <button id="e_save" class="btn btn-primary w-full mt-2">Simpan Perubahan</button>
      </div>
    `)
    wrap.appendChild(c)
    let bertag = n.bertag, ram = n.ram
    c.querySelector('#e_b_yes').onclick = () => { bertag=true; c.querySelector('#e_b_yes').className='active'; c.querySelector('#e_b_no').className='' }
    c.querySelector('#e_b_no').onclick = () => { bertag=false; c.querySelector('#e_b_no').className='active'; c.querySelector('#e_b_yes').className='' }
    c.querySelector('#e_r_lpp').onclick = () => { ram='LPP'; c.querySelector('#e_r_lpp').className='active'; c.querySelector('#e_r_sfc').className='' }
    c.querySelector('#e_r_sfc').onclick = () => { ram='SFC'; c.querySelector('#e_r_sfc').className='active'; c.querySelector('#e_r_lpp').className='' }
    c.querySelector('#e_save').onclick = async () => {
      const menetas = c.querySelector('#e_tm').value === '' ? null : Number(c.querySelector('#e_tm').value)
      const payload = {
        tarikh_dijumpai: c.querySelector('#e_tarikh').value, bertag, ram,
        jumlah_telur_diram: Number(c.querySelector('#e_td').value||0),
        telur_menetas: menetas,
        telur_buruk: c.querySelector('#e_tb').value === '' ? null : Number(c.querySelector('#e_tb').value),
        status: menetas !== null ? 'menetas' : 'diram',
        catatan: c.querySelector('#e_cat').value || null,
        updated_by: state.profile.id
      }
      const { error } = await supabase.from('nest_records').update(payload).eq('id', target.id)
      if (error) { alert('Gagal simpan: ' + error.message); return }
      alert('Disimpan ✓'); go('entries')
    }
    attachDeleteUI(wrap, 'nest_records', target.id)
  }
  return wrap
}

let chartInstances = []
function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = [] }

async function screenDashboard() {
  const year = new Date().getFullYear()
  destroyCharts()
  const wrap = document.createElement('div')
  wrap.innerHTML = `<h1 class="font-display text-2xl mb-1">Dashboard</h1><div class="inline-block rounded px-2.5 py-1 text-xs font-semibold mb-4 bg-teal-900/40">${state.island}</div><div id="stats">Memuatkan...</div>`
  const { data } = await supabase.rpc('get_dashboard_totals', { p_year: year, p_island: state.island })
  const stats = wrap.querySelector('#stats')
  const jumlahTelur = data?.jumlah_telur || 0
  const jumlahMenetas = data?.jumlah_menetas || 0
  const jumlahBuruk = data?.jumlah_buruk || 0
  const jumlahPenyu = data?.jumlah_penyu || 0
  const target = data?.target || 0
  const pct = target ? Math.min(100, Math.round((jumlahTelur/target)*100)) : 0
  const hatchRate = (jumlahMenetas+jumlahBuruk) ? Math.round((jumlahMenetas/(jumlahMenetas+jumlahBuruk))*100) : 0
  const level = Math.floor(pct / 20) + 1

  stats.innerHTML = ''

  stats.appendChild(card(`
    <div class="flex items-center justify-between mb-2">
      <div class="eyebrow">Misi Tahun ${year}</div>
      <div class="text-xs font-bold px-2 py-1 rounded-full bg-emerald-400/20 text-emerald-300">LEVEL ${level}</div>
    </div>
    <div class="font-display text-4xl tabular-num mb-1">${jumlahTelur.toLocaleString()} <span class="text-lg opacity-60">/ ${target ? target.toLocaleString() : '—'}</span></div>
    <div class="xp-bar mt-3">
      <div class="xp-fill" style="width:${pct}%"></div>
      ${[25,50,75].map(m => `<div class="milestone" style="left:${m}%"></div>`).join('')}
    </div>
    <div class="text-xs opacity-70 mt-2">${target ? pct + '% menuju sasaran · Baki ' + (target-jumlahTelur).toLocaleString() + ' telur' : 'Sasaran belum ditetapkan untuk ' + state.island + ' (Admin → Sasaran Tahunan)'}</div>
  `, 'mb-4'))

  // Monthly HP-bar grid — per-month actual vs target, game-style progress
  const { data: monthlyTargetsRows } = await supabase.from('monthly_targets').select('*').eq('year', year).eq('island', state.island)
  const monthlyTargetMap = {}
  ;(monthlyTargetsRows||[]).forEach(r => { monthlyTargetMap[r.month] = r.target_value })
  const monthlyActual = data?.monthly || MONTH_LABELS.map(m => ({ month: m, telur: 0 }))

  const hpCells = MONTH_LABELS.map((label, i) => {
    const m = i + 1
    const actual = monthlyActual[i]?.telur || 0
    const mTarget = monthlyTargetMap[m]
    const mPct = mTarget ? Math.round((actual / mTarget) * 100) : 0
    const fillPct = Math.min(100, mPct)
    const over = mPct > 100
    return `
      <div class="month-hp">
        <div class="month-hp-fill ${over ? 'over' : ''}" style="width:${mTarget ? fillPct : 0}%"></div>
        <div class="month-hp-content">
          <span class="month-hp-label">${label}</span>
          <span class="month-hp-value tabular-num">${actual.toLocaleString()} / ${mTarget ? mTarget.toLocaleString() : '—'}</span>
          <span class="month-hp-pct tabular-num">${mTarget ? mPct + '%' : ''}</span>
        </div>
      </div>
    `
  }).join('')

  stats.appendChild(flatCard(`
    <div class="eyebrow mb-3">Progress Bulanan ${year}</div>
    <div class="grid grid-cols-3 gap-2">${hpCells}</div>
  `, 'mb-4'))

  stats.appendChild(flatCard(`
    <div class="flex items-center justify-between mb-3">
      <div class="eyebrow">Trend Bulanan ${year}</div>
      <select id="metricSelect" class="!w-auto text-xs !py-1 !px-2">
        <option value="telur">Jumlah Telur</option>
        <option value="penyu">Bilangan Penyu</option>
      </select>
    </div>
    <canvas id="chartBar" height="180"></canvas>
  `, 'mb-4'))
  stats.appendChild(flatCard(`
    <div class="eyebrow mb-3" id="cumulativeLabel">Kumulatif Sepanjang Tahun (Telur)</div>
    <canvas id="chartLine" height="180"></canvas>
  `, 'mb-4'))
  stats.appendChild(flatCard(`
    <div class="flex items-center justify-between mb-3">
      <div class="eyebrow">Perbandingan Tahun</div>
      <select id="compareYears" class="!w-auto text-xs !py-1 !px-2">
        <option value="2">2 tahun</option>
        <option value="3">3 tahun</option>
        <option value="5">5 tahun</option>
      </select>
    </div>
    <canvas id="chartCompare" height="200"></canvas>
  `, 'mb-4'))

  const secondaryRow = document.createElement('div')
  secondaryRow.className = 'grid grid-cols-3 gap-3'
  secondaryRow.appendChild(flatCard(`<div class="text-xs opacity-70">Bilangan Penyu</div><div class="font-display text-2xl tabular-num">${jumlahPenyu.toLocaleString()}</div>`))
  secondaryRow.appendChild(flatCard(`<div class="text-xs opacity-70">Kadar Menetas</div><div class="font-display text-2xl tabular-num">${hatchRate}%</div>`))
  secondaryRow.appendChild(flatCard(`<div class="text-xs opacity-70">Telur Buruk</div><div class="font-display text-2xl tabular-num text-red-400">${jumlahBuruk.toLocaleString()}</div>`))
  stats.appendChild(secondaryRow)

  const monthly = data?.monthly || MONTH_LABELS.map(m => ({ month: m, telur: 0 }))
  const monthlyPenyu = data?.monthly_penyu || MONTH_LABELS.map(m => ({ month: m, penyu: 0 }))
  let currentMetric = 'telur'

  const barCtx = stats.querySelector('#chartBar').getContext('2d')
  const barChart = new Chart(barCtx, {
    type: 'bar',
    data: { labels: monthly.map(m=>m.month), datasets: [{ label:'Telur', data: monthly.map(m=>m.telur), backgroundColor:'#2E9099', borderRadius:6 }] },
    options: { plugins:{legend:{display:false}}, scales:{ y:{ grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#9ca3af', precision:0} }, x:{ grid:{display:false}, ticks:{color:'#9ca3af'} } } }
  })
  chartInstances.push(barChart)

  function cumulativeChart(metric) {
    const src = metric === 'telur' ? monthly.map(m=>m.telur) : monthlyPenyu.map(m=>m.penyu)
    let c = 0
    return src.map(v => (c += v))
  }
  const lineCtx = stats.querySelector('#chartLine').getContext('2d')
  const lineChart = new Chart(lineCtx, {
    type: 'line',
    data: { labels: monthly.map(m=>m.month), datasets: [{ label:'Kumulatif', data: cumulativeChart('telur'), borderColor:'#6EE7B7', backgroundColor:'rgba(110,231,183,.15)', fill:true, tension:.35 }] },
    options: { plugins:{legend:{display:false}}, scales:{ y:{ grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#9ca3af', precision:0} }, x:{ grid:{display:false}, ticks:{color:'#9ca3af'} } } }
  })
  chartInstances.push(lineChart)

  stats.querySelector('#metricSelect').onchange = (e) => {
    currentMetric = e.target.value
    const isEggs = currentMetric === 'telur'
    barChart.data.datasets[0].label = isEggs ? 'Telur' : 'Penyu'
    barChart.data.datasets[0].data = isEggs ? monthly.map(m=>m.telur) : monthlyPenyu.map(m=>m.penyu)
    barChart.update()
    lineChart.data.datasets[0].data = cumulativeChart(currentMetric)
    lineChart.update()
    stats.querySelector('#cumulativeLabel').textContent = isEggs ? 'Kumulatif Sepanjang Tahun (Telur)' : 'Kumulatif Sepanjang Tahun (Penyu)'
  }

  async function renderCompare(nYears) {
    const years = Array.from({length:nYears}, (_,i) => year - i).reverse()
    const { data: multi } = await supabase.rpc('get_multi_year_monthly', { p_years: years, p_island: state.island })
    const colors = ['#2E9099','#6EE7B7','#E0A458','#E1604C','#9AB18F']
    const datasets = years.map((y,i) => ({
      label: String(y),
      data: (multi?.[y] || monthly.map(m=>({month:m.month,telur:0}))).map(m=>m.telur),
      borderColor: colors[i % colors.length], backgroundColor:'transparent', tension:.35
    }))
    const compareCtx = stats.querySelector('#chartCompare').getContext('2d')
    chartInstances.push(new Chart(compareCtx, {
      type: 'line',
      data: { labels: MONTH_LABELS, datasets },
      options: { plugins:{legend:{labels:{color:'#9ca3af'}}}, scales:{ y:{ grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#9ca3af'} }, x:{ grid:{display:false}, ticks:{color:'#9ca3af'} } } }
    }))
  }
  renderCompare(2)
  stats.querySelector('#compareYears').onchange = (e) => {
    chartInstances[chartInstances.length-1]?.destroy()
    chartInstances.pop()
    renderCompare(Number(e.target.value))
  }

  return wrap
}

git commit -m "update video"
git push</pre>

  body.appendChild(card(`

// ---------- Excel export logic ----------
async function exportToExcel(island, year) {
  const templateUrl = `assets/template-${island}.xlsx`
  const res = await fetch(templateUrl)
  if (!res.ok) throw new Error(`Template ${templateUrl} tidak dijumpai`)
  const buf = await res.arrayBuffer()
  const wb = XLSX.read(buf, { type: 'array', cellFormula: true, cellStyles: true })

  const yearStart = `${year}-01-01`
  const yearEnd = `${year}-12-31`
  const { data: dailyRows } = await supabase.from('daily_entries').select('*').eq('island', island).gte('tarikh', yearStart).lte('tarikh', yearEnd)
  const { data: nestRows } = await supabase.from('nest_records').select('*').eq('island', island).gte('tarikh_dijumpai', yearStart).lte('tarikh_dijumpai', yearEnd)

  const buckets = {}
  function ensureBucket(date, ram) {
    const key = `${date}|${ram}`
    if (!buckets[key]) buckets[key] = { bp_b:0, bp_t:0, td_b:0, td_t:0, tm_b:0, tm_t:0, tm_has:false, dk:0, cat:[] }
    return buckets[key]
  }
  ;(dailyRows||[]).forEach(d => {
    const b = ensureBucket(d.tarikh, d.ram)
    b.bp_b += d.bilangan_penyu_bertag; b.bp_t += d.bilangan_penyu_takbertag
    b.td_b += d.jumlah_telur_diram_bertag; b.td_t += d.jumlah_telur_diram_takbertag
    if (d.telur_menetas_bertag !== null) { b.tm_b += d.telur_menetas_bertag||0; b.tm_has = true }
    if (d.telur_menetas_takbertag !== null) { b.tm_t += d.telur_menetas_takbertag||0; b.tm_has = true }
    if (d.jumlah_telur_dikeluarkan) b.dk += d.jumlah_telur_dikeluarkan
    if (d.catatan) b.cat.push(d.catatan)
  })
  ;(nestRows||[]).forEach(n => {
    const b = ensureBucket(n.tarikh_dijumpai, n.ram)
    if (n.bertag) { b.bp_b += 1; b.td_b += n.jumlah_telur_diram; if (n.telur_menetas !== null) { b.tm_b += n.telur_menetas||0; b.tm_has = true } }
    else { b.bp_t += 1; b.td_t += n.jumlah_telur_diram; if (n.telur_menetas !== null) { b.tm_t += n.telur_menetas||0; b.tm_has = true } }
    if (n.jumlah_dikeluarkan) b.dk += n.jumlah_dikeluarkan
    if (n.catatan) b.cat.push(n.catatan)
  })

  MONTH_SHEET_NAMES.forEach((sheetName, mi) => {
    const ws = wb.Sheets[sheetName]
    if (!ws) return
    const daysInMonth = new Date(year, mi+1, 0).getDate()
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`
      const row = 7 + day
      const lpp = buckets[`${dateStr}|LPP`]
      const sfc = buckets[`${dateStr}|SFC`]
      const setCell = (col, val) => {
        if (val === undefined || val === null || val === 0) return
        const ref = `${col}${row}`
        const existing = ws[ref] || {}
        ws[ref] = { ...existing, t:'n', v: val }
      }
      if (lpp) { setCell('C', lpp.bp_b); setCell('D', lpp.bp_t); setCell('G', lpp.td_b); setCell('H', lpp.td_t); if (lpp.tm_has) { setCell('K', lpp.tm_b); setCell('L', lpp.tm_t) } if (lpp.dk) setCell('S', lpp.dk) }
      if (sfc) { setCell('E', sfc.bp_b); setCell('F', sfc.bp_t); setCell('I', sfc.td_b); setCell('J', sfc.td_t); if (sfc.tm_has) { setCell('M', sfc.tm_b); setCell('N', sfc.tm_t) } if (sfc.dk) setCell('T', sfc.dk) }
      const notes = [...(lpp?.cat||[]), ...(sfc?.cat||[])].join('; ')
      if (notes) { const ref = `T${row}`; ws[ref] = { ...(ws[ref]||{}), t:'s', v: notes } }
    }
  })

  XLSX.writeFile(wb, `Penyu-${island}-${year}.xlsx`)
}

// ---------- Init ----------
render(location.hash.slice(1) || 'splash')
</script>
</body>
